<button
	type="button"
	class="panel-toggle panel-hamburger"
	data-target="saved-panel"
	data-desktop-toggle-class="saved-collapsed"
	data-desktop-store-key="vstreamware.saved-panel-collapsed"
	aria-controls="saved-panel"
	aria-expanded="true"
	aria-label="Hide saved channels panel"
>
	<svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
		<rect width="18" height="18" x="3" y="3" rx="2"/>
		<path d="M9 3v18"/>
	</svg>
	<span class="panel-toggle-text" data-expanded-label="Hide Saved" data-collapsed-label="Show Saved">Hide Saved</span>
</button>
