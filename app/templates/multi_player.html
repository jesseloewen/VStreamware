<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#141414">
    <meta name="application-name" content="VStreamware">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="VStreamware">
    <title>Multi-Player – VStreamware</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/multi_player.css') }}">
</head>
<body class="browser-page mp-root-body" data-transcode-status-url="{{ url_for('dashboard.transcode_queue_status') }}">
    <!-- Shared panel overlay backdrop (mobile) -->
    <div class="panel-overlay" id="mp-panel-overlay" aria-hidden="true"></div>
    <main class="container mp-main">

        <!-- ── Multi-player shell ── -->
        <div class="multi-player-page">

        <!-- ── Collapsible header (page header + toolbar) ── -->
        <div class="mp-header-wrap" id="mp-header-wrap">

            <!-- Page header -->
            <header class="page-header browser-header">
                <h1 class="app-title">
                    <a class="app-title-link" href="{{ url_for('dashboard.index') }}" aria-label="Go to home">
                        <img class="app-title-icon" src="{{ url_for('static', filename='icons/icon-64.png') }}" alt="VStreamware icon">
                        <span>VStreamware</span>
                    </a>
                </h1>
                <div class="header-actions">
                    <div class="header-transcode-indicator" id="header-transcode-indicator" hidden role="status" aria-live="polite" aria-atomic="true">
                        <span class="header-transcode-dot" aria-hidden="true"></span>
                        <span class="header-transcode-label" id="header-transcode-label">Transcoding</span>
                    </div>
                    <a class="header-icon-link" href="{{ url_for('dashboard.index') }}" aria-label="Go to home">
                        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 10.5 12 3l9 7.5"></path>
                            <path d="M5 9.5V21h14V9.5"></path>
                        </svg>
                        <span class="sr-only">Home</span>
                    </a>
                </div>
            </header>

            <!-- Toolbar -->
            <div class="mp-toolbar" id="mp-toolbar" role="toolbar" aria-label="Multi-player controls">
                <button
                    type="button"
                    class="panel-hamburger mp-picker-toggle"
                    id="mp-picker-toggle"
                    aria-controls="mp-picker-panel"
                    aria-expanded="true"
                    aria-label="Hide recordings picker"
                >
                    <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect width="18" height="18" x="3" y="3" rx="2"/>
                        <path d="M9 3v18"/>
                    </svg>
                    <span class="panel-toggle-text" data-expanded-label="Hide Picker" data-collapsed-label="Show Picker">Hide Picker</span>
                </button>
                <span class="mp-toolbar-sep" aria-hidden="true"></span>
                <div class="mp-toolbar-actions">
                    <button type="button" id="mp-clear-all" class="danger" aria-label="Remove all videos from the player">Clear All</button>
                </div>
                <span class="mp-sync-status" id="mp-sync-status" aria-live="polite"></span>
                <!-- Chat panel toggle (right side of toolbar) -->
                <button
                    type="button"
                    class="panel-hamburger mp-chat-toggle"
                    id="mp-chat-toggle"
                    aria-controls="mp-chat-panel"
                    aria-expanded="false"
                    aria-label="Show chat panel"
                >
                    <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 5.5h16a1.5 1.5 0 0 1 1.5 1.5v9a1.5 1.5 0 0 1-1.5 1.5H9l-5 4v-4H4A1.5 1.5 0 0 1 2.5 16V7A1.5 1.5 0 0 1 4 5.5Z"/>
                        <path d="M7.5 10.5h9"/>
                        <path d="M7.5 13.5h6"/>
                    </svg>
                    <span class="panel-toggle-text"
                        data-expanded-label="Hide Chat"
                        data-collapsed-label="Show Chat">Show Chat</span>
                </button>

                <!-- Header collapse button — rightmost in toolbar -->
                <button
                    type="button"
                    class="mp-header-collapse-btn"
                    id="mp-header-collapse-btn"
                    aria-label="Collapse header"
                    aria-controls="mp-header-wrap"
                >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </button>
            </div>

        </div><!-- /.mp-header-wrap -->

        <!-- Floating restore button — visible when header is collapsed -->
        <button
            type="button"
            class="mp-header-show-btn"
            id="mp-header-show-btn"
            aria-label="Show header"
            aria-controls="mp-header-wrap"
            hidden
        >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 9l6 6 6-6"/>
            </svg>
        </button>

            <!-- Body: picker + stage -->
            <div class="mp-body">

                <!-- ── Left: recording picker ── -->
                <aside class="mp-picker-panel" id="mp-picker-panel" aria-label="Recording picker">
                    <div class="mp-picker-header">
                        <div class="mp-picker-header-title-row">
                            <h3>Pick Recordings</h3>
                            <button type="button" class="mp-panel-close-btn" id="mp-picker-close"
                                aria-label="Close recordings picker">✕</button>
                        </div>
                        <div class="mp-picker-filters">
                            <select id="mp-filter-channel" aria-label="Filter by channel">
                                <option value="all">All channels</option>
                            </select>
                            <select id="mp-filter-day" aria-label="Filter by day">
                                <option value="all">All days</option>
                            </select>
                        </div>
                        <div class="mp-picker-search">
                            <input type="search" id="mp-filter-search" placeholder="Search titles…" autocomplete="off" spellcheck="false" aria-label="Search recordings">
                        </div>
                    </div>
                    <div class="mp-picker-list" id="mp-picker-list" role="list" aria-label="Available recordings">
                        <p class="mp-picker-empty" id="mp-picker-empty">Loading recordings…</p>
                    </div>
                </aside>

                <!-- ── Right: video stage + chat panel ── -->
                <div class="mp-stage-chat-wrap">

                <!-- Video stage -->
                <section class="mp-stage" aria-label="Video stage">

                    <!-- Global sync bar -->
                    <div class="mp-sync-bar" id="mp-sync-bar" hidden aria-label="Global playback sync">
                        <div class="mp-sync-actions">
                            <button type="button" id="mp-play-pause-all" class="mp-sync-icon-btn" aria-label="Play all videos">
                                <svg class="mp-icon-play" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
                                <svg class="mp-icon-pause" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true" hidden><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                            </button>
                            <button type="button" id="mp-sync-now" class="mp-sync-icon-btn secondary" aria-label="Re-sync all videos to primary position">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
                            </button>
                            <button type="button" id="mp-seek-back" class="secondary" aria-label="Seek back 10 seconds">−10s</button>
                            <button type="button" id="mp-seek-forward" class="secondary" aria-label="Seek forward 10 seconds">+10s</button>
                        </div>
                        <span class="mp-sync-time" id="mp-sync-time">0:00</span>
                        <input
                            type="range"
                            id="mp-sync-seek"
                            class="mp-sync-seek"
                            min="0"
                            max="0"
                            step="0.1"
                            value="0"
                            aria-label="Global sync seek"
                        >
                        <span class="mp-sync-time" id="mp-sync-duration">0:00</span>
                    </div>

                    <!-- Empty placeholder: removed from layout when hidden -->
                    <div class="mp-stage-empty" id="mp-stage-empty">
                        <div>
                            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#4f86b4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:block;margin:0 auto 12px"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                            <p>Add recordings from the left panel to start watching.</p>
                            <p style="font-size:12px;margin-top:4px">Up to 4 videos can be played at once. Use the volume sliders to control audio per slot.</p>
                        </div>
                    </div>

                    <!-- Slot grid: takes full stage space when visible -->
                    <div class="mp-slot-grid" id="mp-slot-grid" data-count="0" hidden></div>

                </section>

                <!-- Resize handle between stage and chat panel -->
                <div class="mp-chat-resize-handle" id="mp-chat-resize-handle"
                    role="separator" aria-orientation="vertical"
                    aria-label="Resize chat panel"
                    hidden></div>

                <!-- ── Global Chat Panel ── -->
                <aside class="mp-chat-panel" id="mp-chat-panel" aria-label="Multi-player chat" hidden>
                    <section class="panel-shell">

                        <!-- Chat panel header -->
                        <header class="panel-title mp-chat-header">
                            <div class="mp-chat-header-title-row">
                                <h3 class="mp-chat-header-title">Chat</h3>
                                <button type="button" class="mp-panel-close-btn mp-chat-close-btn" id="mp-chat-close"
                                    aria-label="Close chat panel">✕</button>
                            </div>
                            <div class="mp-chat-header-controls">

                                <!-- Display mode: merged / columns -->
                                <div class="mp-chat-mode-group" role="group" aria-label="Chat display mode">
                                    <button type="button" class="mp-chat-mode-btn is-active" data-chat-mode="merged"
                                        aria-pressed="true" aria-label="Merged chat thread">Merged</button>
                                    <button type="button" class="mp-chat-mode-btn" data-chat-mode="columns"
                                        aria-pressed="false" aria-label="Chat in separate columns">Columns</button>
                                </div>

                                <!-- Per-slot sidebar toggle -->
                                <button type="button" class="mp-chat-sidebar-toggle-btn" id="mp-chat-sidebar-toggle"
                                    aria-pressed="false" aria-label="Show per-slot chat sidebars">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <rect width="18" height="18" x="3" y="3" rx="2"/>
                                        <path d="M15 3v18"/>
                                    </svg>
                                    <span>Per-Slot</span>
                                </button>

                                <!-- Jump to latest (shown when scrolled up) -->
                                <button type="button" class="button-link mp-chat-jump"
                                    id="mp-chat-jump" hidden aria-label="Jump to latest messages">
                                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-right:3px"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                                    Latest
                                </button>

                            </div>
                        </header>

                        <!-- Channel selector -->
                        <div class="mp-chat-channel-selector" id="mp-chat-channel-selector">
                            <p class="mp-chat-channel-selector-label">Channels</p>
                            <div class="mp-chat-channel-list" id="mp-chat-channel-list">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <!-- Chat body -->
                        <div class="panel-body mp-chat-body">
                            <p class="mp-chat-status muted" id="mp-chat-status">Add videos to start chat replay.</p>

                            <!-- Merged view -->
                            <div class="mp-chat-merged" id="mp-chat-merged">
                                <div class="mp-chat-list" id="mp-chat-merged-list"
                                    role="log" aria-label="Merged chat messages" aria-live="polite"></div>
                            </div>

                            <!-- Columns view -->
                            <div class="mp-chat-columns" id="mp-chat-columns" hidden></div>


                        </div>

                    </section>
                </aside>

                </div><!-- /.mp-stage-chat-wrap -->
            </div>
        </div>
    </main>

    <script>
    (() => {
        'use strict';

        /* ── Constants ── */
        const MAX_SLOTS       = 4;
        const SYNC_INTERVAL_MS = 500;   /* how often we nudge drifted players */
        const DRIFT_TOLERANCE_S = 0.35; /* seconds of drift before correcting */
        const SEEK_STEP_S      = 10;
        const FALLBACK_THUMB   = {{ url_for('static', filename='icons/icon-64.png') | tojson }};
        const RECORDINGS_INDEX = {{ url_for('dashboard.recordings_index') | tojson }};
        const DISPLAY_TZ_PREF  = {{ display_timezone | tojson }};

        /* ── State ── */
        let allRecordings    = [];   /* full catalog from API */
        let channelDays      = {};
        let slots            = [];   /* array of slot objects (max 4) */
        let primarySlotIndex = 0;    /* which slot drives global time */
        let syncTimer        = null;
        let isSeeking        = false;
        let catalogSignature = '';

        /* ── DOM refs ── */
        const pickerList     = document.getElementById('mp-picker-list');
        const pickerEmpty    = document.getElementById('mp-picker-empty');
        const filterChannel  = document.getElementById('mp-filter-channel');
        const filterDay      = document.getElementById('mp-filter-day');
        const filterSearch   = document.getElementById('mp-filter-search');
        const slotGrid       = document.getElementById('mp-slot-grid');
        const stageEmpty     = document.getElementById('mp-stage-empty');
        const syncBar        = document.getElementById('mp-sync-bar');
        const syncTimeEl     = document.getElementById('mp-sync-time');
        const syncDurationEl = document.getElementById('mp-sync-duration');
        const syncSeek       = document.getElementById('mp-sync-seek');
        const syncStatusEl      = document.getElementById('mp-sync-status');
        const chatToggleBtn      = document.getElementById('mp-chat-toggle');
        const chatPanel          = document.getElementById('mp-chat-panel');
        const chatResizeHandle   = document.getElementById('mp-chat-resize-handle');
        const chatStatusEl       = document.getElementById('mp-chat-status');
        const chatMergedList     = document.getElementById('mp-chat-merged-list');
        const chatColumnsEl      = document.getElementById('mp-chat-columns');
        const chatMergedEl       = document.getElementById('mp-chat-merged');
        const chatJumpBtn        = document.getElementById('mp-chat-jump');
        const chatChannelList    = document.getElementById('mp-chat-channel-list');
        const chatSidebarToggle  = document.getElementById('mp-chat-sidebar-toggle');
        const stageChatWrap      = document.querySelector('.mp-stage-chat-wrap');
        const btnPlayPauseAll   = document.getElementById('mp-play-pause-all');
        const btnSyncNow        = document.getElementById('mp-sync-now');
        const btnClearAll       = document.getElementById('mp-clear-all');
        const btnSeekBack       = document.getElementById('mp-seek-back');
        const btnSeekFwd        = document.getElementById('mp-seek-forward');
        const pickerToggle   = document.getElementById('mp-picker-toggle');
        const mpPanelOverlay = document.getElementById('mp-panel-overlay');
        const pickerCloseBtn = document.getElementById('mp-picker-close');
        const chatCloseBtn   = document.getElementById('mp-chat-close');
        const mpHeaderWrap      = document.getElementById('mp-header-wrap');
        const mpHeaderCollapseBtn = document.getElementById('mp-header-collapse-btn');
        const mpHeaderShowBtn   = document.getElementById('mp-header-show-btn');

        /* ── Chat panel state ── */
        const CHAT_PANEL_KEY       = 'vstreamware.mp-chat-open';
        const CHAT_WIDTH_KEY       = 'vstreamware.mp-chat-width';
        const CHAT_MODE_KEY        = 'vstreamware.mp-chat-mode';
        const CHAT_SIDEBAR_KEY     = 'vstreamware.mp-chat-sidebar';
        const CHAT_CHANNELS_KEY    = 'vstreamware.mp-chat-channels';
        const MP_CHAT_OPEN_CLASS   = 'mp-chat-open';
        const MP_SIDEBAR_CLASS     = 'mp-chat-sidebar-mode';
        const CHAT_MIN_WIDTH_PX    = 240;
        const CHAT_MAX_RATIO       = 0.48;
        const CHAT_DEFAULT_RATIO   = 0.28;
        const CHAT_POLL_MS         = 2500;   /* how often to fetch new chat */
        const CHAT_WINDOW_MS       = 120000; /* 2-min window around current position */

        let chatMode              = 'merged'; /* 'merged' | 'columns' */
        let chatSidebarMode       = false;    /* per-slot sidebars */
        let chatEnabledChannels   = new Set(); /* which channels to show chat for */
        let chatData              = {};  /* channelKey → { messages: [], latestUtcMs } */
        let chatPollTimer         = null;
        let chatAutoFollow        = true;
        let chatResizeActive      = false;
        let chatResizePointerId   = null;
        let chatSlotColors        = {}; /* channelKey → hsl color string */

        const CHANNEL_COLORS = [
            '#60a5fa', '#34d399', '#fb923c', '#f472b6',
            '#a78bfa', '#2dd4bf', '#fbbf24', '#f87171',
        ];
        let colorIdx = 0;

        const getChannelColor = (channel) => {
            const key = String(channel || '').toLowerCase();
            if (!chatSlotColors[key]) {
                chatSlotColors[key] = CHANNEL_COLORS[colorIdx % CHANNEL_COLORS.length];
                colorIdx++;
            }
            return chatSlotColors[key];
        };

        /* ── Mobile detection ── */
        const MP_MOBILE_BREAKPOINT = 980;
        const isMobileViewport = () => window.innerWidth <= MP_MOBILE_BREAKPOINT;

        /* ── Overlay backdrop ── */
        const MP_OVERLAY_PICKER = 'picker';
        const MP_OVERLAY_CHAT   = 'chat';
        let mpOverlayOwner = null; /* which panel currently owns the overlay */

        const showMpOverlay = (owner) => {
            mpOverlayOwner = owner;
            if (mpPanelOverlay) {
                mpPanelOverlay.classList.add('is-visible');
                mpPanelOverlay.setAttribute('aria-hidden', 'false');
            }
            document.body.classList.add('panel-open');
        };

        const hideMpOverlay = () => {
            mpOverlayOwner = null;
            if (mpPanelOverlay) {
                mpPanelOverlay.classList.remove('is-visible');
                mpPanelOverlay.setAttribute('aria-hidden', 'true');
            }
            document.body.classList.remove('panel-open');
        };

        /* Called when backdrop is clicked or Escape is pressed */
        const closeMobilePanel = (which) => {
            if (which === MP_OVERLAY_PICKER || !which) {
                if (isMobileViewport()) {
                    /* Mobile: remove is-open class instead of collapsing */
                    const pickerPanel = document.getElementById('mp-picker-panel');
                    if (pickerPanel) pickerPanel.classList.remove('is-open');
                    if (mpOverlayOwner === MP_OVERLAY_PICKER) hideMpOverlay();
                    updatePickerToggleState();
                    return;
                }
            }
            if (which === MP_OVERLAY_CHAT || !which) {
                if (isMobileViewport() && isChatOpen()) {
                    /* Mobile: close the chat panel overlay */
                    setChatOpen(false, true);
                    return;
                }
            }
        };

        /* ── Page reference (used by header collapse + picker collapse) ── */
        const mpPage = document.querySelector('.multi-player-page');

        /* ── Header collapse ──────────────────────────────────────────────────── */
        const HEADER_COLLAPSE_KEY   = 'vstreamware.mp-header-collapsed';
        const HEADER_COLLAPSE_CLASS = 'mp-header-collapsed';

        const isHeaderCollapsed = () =>
            Boolean(mpPage && mpPage.classList.contains(HEADER_COLLAPSE_CLASS));

        const setHeaderCollapsed = (collapsed, persist = true) => {
            if (!mpPage) return;
            mpPage.classList.toggle(HEADER_COLLAPSE_CLASS, Boolean(collapsed));
            /* Show/hide the floating restore button */
            if (mpHeaderShowBtn) mpHeaderShowBtn.hidden = !collapsed;
            /* Update aria-expanded on the collapse button */
            if (mpHeaderCollapseBtn) {
                mpHeaderCollapseBtn.setAttribute('aria-label',
                    collapsed ? 'Expand header' : 'Collapse header');
            }
            if (persist) {
                try { window.localStorage.setItem(HEADER_COLLAPSE_KEY, collapsed ? '1' : '0'); }
                catch (_e) {}
            }
        };

        /* Restore persisted state */
        (() => {
            try {
                const raw = window.localStorage.getItem(HEADER_COLLAPSE_KEY);
                if (raw === '1' || raw === 'true') setHeaderCollapsed(true, false);
            } catch (_e) {}
        })();

        if (mpHeaderCollapseBtn) {
            mpHeaderCollapseBtn.addEventListener('click', () =>
                setHeaderCollapsed(!isHeaderCollapsed()));
        }

        if (mpHeaderShowBtn) {
            mpHeaderShowBtn.addEventListener('click', () =>
                setHeaderCollapsed(false));
        }

        if (mpPanelOverlay) {
            mpPanelOverlay.addEventListener('click', () => {
                if (mpOverlayOwner) closeMobilePanel(mpOverlayOwner);
                else { closeMobilePanel(MP_OVERLAY_PICKER); closeMobilePanel(MP_OVERLAY_CHAT); }
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            if (!isMobileViewport()) return;
            if (mpOverlayOwner) { closeMobilePanel(mpOverlayOwner); e.preventDefault(); }
        });

        /* ── Picker collapse (mirrors saved-panel toggle pattern) ── */
        const PICKER_COLLAPSE_KEY  = 'vstreamware.mp-picker-collapsed';
        const PICKER_COLLAPSE_CLASS = 'mp-picker-collapsed';

        const pickerPanel = document.getElementById('mp-picker-panel');

        const updatePickerToggleState = () => {
            if (!pickerToggle || !mpPage) return;
            const mobile = isMobileViewport();
            const isOpen = mobile
                ? (pickerPanel && pickerPanel.classList.contains('is-open'))
                : !mpPage.classList.contains(PICKER_COLLAPSE_CLASS);
            pickerToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            pickerToggle.classList.toggle('is-active', Boolean(isOpen));
            const labelEl = pickerToggle.querySelector('.panel-toggle-text');
            if (labelEl) {
                const nextText = isOpen
                    ? (labelEl.getAttribute('data-expanded-label') || 'Hide Picker')
                    : (labelEl.getAttribute('data-collapsed-label') || 'Show Picker');
                labelEl.textContent = nextText;
            }
            pickerToggle.setAttribute('aria-label',
                isOpen ? 'Hide recordings picker' : 'Show recordings picker');
        };

        const setPickerCollapsed = (collapsed, persist = false) => {
            if (!mpPage) return;
            if (isMobileViewport()) {
                /* Mobile: open/close as fixed overlay, ignore collapse state */
                const wantOpen = !collapsed;
                if (pickerPanel) pickerPanel.classList.toggle('is-open', wantOpen);
                if (wantOpen) {
                    /* Close chat overlay first */
                    if (isChatOpen()) setChatOpen(false, true);
                    showMpOverlay(MP_OVERLAY_PICKER);
                } else {
                    if (mpOverlayOwner === MP_OVERLAY_PICKER) hideMpOverlay();
                }
                updatePickerToggleState();
                return;
            }
            /* Desktop */
            mpPage.classList.toggle(PICKER_COLLAPSE_CLASS, Boolean(collapsed));
            updatePickerToggleState();
            if (persist) {
                try { window.localStorage.setItem(PICKER_COLLAPSE_KEY, collapsed ? '1' : '0'); }
                catch (_e) {}
            }
        };

        /* Restore persisted state on page load */
        (() => {
            try {
                const raw = window.localStorage.getItem(PICKER_COLLAPSE_KEY);
                const wasCollapsed = raw === '1' || raw === 'true';
                if (!isMobileViewport()) setPickerCollapsed(wasCollapsed, false);
                else updatePickerToggleState(); /* mobile: start closed */
            } catch (_e) { updatePickerToggleState(); }
        })();

        if (pickerToggle) {
            pickerToggle.addEventListener('click', () => {
                if (isMobileViewport()) {
                    const isCurrentlyOpen = pickerPanel && pickerPanel.classList.contains('is-open');
                    setPickerCollapsed(isCurrentlyOpen, false); /* toggle: collapsed = !open */
                } else {
                    const nowCollapsed = !mpPage.classList.contains(PICKER_COLLAPSE_CLASS);
                    setPickerCollapsed(nowCollapsed, true);
                }
            });
        }

        if (pickerCloseBtn) {
            pickerCloseBtn.addEventListener('click', () => setPickerCollapsed(true, false));
        }

        /* ── Helpers ── */
        const escHtml = (v) => String(v ?? '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

        const fmtTime = (secs) => {
            if (!Number.isFinite(secs) || secs < 0) return '0:00';
            const s = Math.floor(secs);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            return `${m}:${String(sec).padStart(2, '0')}`;
        };

        const fmtDateTime = (isoStr) => {
            if (!isoStr) return '';
            const d = new Date(isoStr);
            if (isNaN(d.getTime())) return isoStr;
            const tz = (DISPLAY_TZ_PREF && DISPLAY_TZ_PREF !== 'auto') ? DISPLAY_TZ_PREF : undefined;
            try { return d.toLocaleString(undefined, tz ? { timeZone: tz } : undefined); }
            catch { return d.toLocaleString(); }
        };

        const setSyncStatus = (msg, kind = '') => {
            if (!syncStatusEl) return;
            syncStatusEl.textContent = msg;
            syncStatusEl.className = 'mp-sync-status'
                + (kind === 'synced' ? ' is-synced' : kind === 'error' ? ' is-error' : '');
        };

        /* ── UTC-wall-clock → playback-seconds conversion ──
         *
         * Each recording has a recording_start_utc_ms value.  When all recordings
         * originate from the same real-world event (e.g. a Twitch stream), they
         * all share the same wall-clock timeline.  We pick the PRIMARY slot's
         * recording_start_utc_ms as the "epoch" and express every other recording's
         * position as:
         *
         *   playbackSeconds = wallClockOffsetFromEpoch + slotUserOffsetSeconds
         *
         * where wallClockOffsetFromEpoch = (slot.startUtcMs - epoch) / 1000.
         *
         * If a recording has no startUtcMs we fall back to treating it as
         * zero-offset (i.e. all videos started at the same time).
         */
        const getEpochMs = () => {
            if (slots.length === 0) return null;
            const primary = slots[primarySlotIndex] || slots[0];
            return primary.startUtcMs || null;
        };

        /* Compute the wall-clock "absolute" seconds for a given playback position
         * in the primary slot. Returns null if epoch is unavailable. */
        const primaryPlaybackToWallClock = (playbackSecs) => {
            const epoch = getEpochMs();
            if (epoch === null) return null;
            return epoch / 1000 + playbackSecs;
        };

        /* For a given slot, what playback position corresponds to a wall-clock
         * absolute second (from primaryPlaybackToWallClock)? */
        const wallClockToSlotPlayback = (slot, wallClockSecs) => {
            if (!slot.startUtcMs || !getEpochMs()) {
                /* No UTC info – just mirror the primary position */
                return wallClockSecs - (getEpochMs() || 0) / 1000;
            }
            const slotOffsetSecs = (slot.startUtcMs - getEpochMs()) / 1000;
            return wallClockSecs - slotOffsetSecs / 1 + slot.userOffsetSecs;
        };

        /* Simpler form: given the PRIMARY slot's currentTime, what time should
         * a peer slot be at (accounting for UTC offsets + user tweak)? */
        const targetTimeForSlot = (primaryCurrentTime, slotIndex) => {
            const primary = slots[primarySlotIndex] || slots[0];
            const slot    = slots[slotIndex];
            if (!slot || slot === primary) return primaryCurrentTime;

            /* Delta in wall-clock seconds between the two recordings' starts */
            const utcDelta = (primary.startUtcMs && slot.startUtcMs)
                ? (slot.startUtcMs - primary.startUtcMs) / 1000
                : 0;

            /* slot should be at: primaryTime - utcDelta + slot's user offset
             * (subtracting utcDelta: if slot started later, its t=0 is further
             *  along the wall-clock, so we need a smaller playback position) */
            return primaryCurrentTime - utcDelta + slot.userOffsetSecs;
        };

        /* ── Shared AudioContext (created once, resumed on first play interaction) ── */
        let sharedAudioCtx = null;

        const getAudioCtx = () => {
            if (!sharedAudioCtx) {
                try { sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch (_e) { sharedAudioCtx = null; }
            }
            return sharedAudioCtx;
        };

        const resumeAudioCtx = () => {
            const ctx = getAudioCtx();
            if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
        };

        /* ── Slot creation ── */
        const createSlotObject = (recording) => {
            /* First slot defaults to 100% volume, every subsequent slot to 0% */
            const isFirst = slots.length === 0;
            return {
                id: `slot-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                recording,
                startUtcMs: Number(recording.recording_start_utc_ms) || null,
                userOffsetSecs: 0,
                videoEl: null,
                volume: isFirst ? 1 : 0,
                pan: 0,
                audioSourceNode: null,  /* MediaElementAudioSourceNode */
                pannerNode: null,       /* StereoPannerNode */
                gainNode: null,         /* GainNode for per-slot volume */
            };
        };

        /* ── DOM slot builder ── */
        const buildSlotEl = (slot, index) => {
            const rec  = slot.recording;
            const isLive = Boolean(rec.is_live);
            const label = escHtml(`${rec.channel} – ${rec.display_title || rec.file_name}`);

            const el = document.createElement('div');
            el.className = 'mp-slot';
            el.dataset.slotId = slot.id;
            el.innerHTML = `
                <div class="mp-slot-header">
                    ${isLive ? '<span class="mp-slot-live-dot" title="Live" aria-label="Live"></span>' : ''}
                    <span class="mp-slot-label" title="${label}">${label}</span>
                    <div class="mp-slot-badges">
                        <button type="button" class="mp-slot-remove-btn" data-slot-id="${slot.id}"
                            aria-label="Remove this video">✕</button>
                    </div>
                </div>

                <div class="mp-slot-video-wrap">
                    <video
                        class="mp-slot-video"
                        preload="${isLive ? 'auto' : 'metadata'}"
                        playsinline
                    ></video>
                    <div class="mp-slot-overlay" id="overlay-${slot.id}">
                        <span class="mp-slot-overlay-text">Loading…</span>
                    </div>
                </div>

                <div class="mp-slot-controls">
                <button type="button" class="mp-slot-ctrl-btn mp-slot-play-btn" data-slot-id="${slot.id}"
                    aria-label="Play/Pause this video">
                    <svg class="mp-icon-play" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="mp-icon-pause" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true" hidden>
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <div class="mp-slot-av-controls">
                    <div class="mp-av-row">
                        <span class="mp-av-label">Vol</span>
                        <input
                            type="range"
                            class="mp-volume-slider"
                            data-slot-id="${slot.id}"
                            min="0" max="1" step="0.02" value="${slot.volume}"
                            aria-label="Volume"
                        >
                        <span class="mp-av-value mp-volume-value" id="vol-val-${slot.id}">${fmtVolume(slot.volume)}</span>
                    </div>
                    <div class="mp-av-row">
                        <span class="mp-av-label">Pan</span>
                        <input
                            type="range"
                            class="mp-pan-slider"
                            data-slot-id="${slot.id}"
                            min="-1" max="1" step="0.05" value="0"
                            aria-label="Pan left/right"
                        >
                        <span class="mp-av-value mp-pan-value" id="pan-val-${slot.id}">C</span>
                    </div>
                </div>

                <div class="mp-offset-group" aria-label="Time offset adjustment">
                    <span class="mp-offset-label">Offset</span>
                    <button type="button" class="mp-offset-dec" data-slot-id="${slot.id}"
                        aria-label="Decrease offset by 0.1 seconds">−</button>
                    <input
                        type="number"
                        class="mp-offset-input"
                        data-slot-id="${slot.id}"
                        value="0"
                        step="0.1"
                        aria-label="Time offset in seconds (positive = delay this video)"
                    >
                    <button type="button" class="mp-offset-inc" data-slot-id="${slot.id}"
                        aria-label="Increase offset by 0.1 seconds">+</button>
                </div>

                <span class="mp-slot-time" id="time-${slot.id}">0:00</span>
                </div>
            `;
            return el;
        };

        /* ── Stage layout refresh ── */
        const refreshStageLayout = () => {
            const count = slots.length;
            slotGrid.dataset.count = String(count);

            if (count === 0) {
                slotGrid.hidden = true;
                stageEmpty.hidden = false;
                syncBar.hidden = true;
            } else {
                slotGrid.hidden = false;
                stageEmpty.hidden = true;
                syncBar.hidden = false;
            }
        };

        /* ── Overlap window: the union UTC span of all loaded slots ──
         * Returns { startMs, endMs } or null when no slots have UTC data. */
        const getActiveWindowMs = () => {
            let startMs = Infinity;
            let endMs   = -Infinity;
            let hasData = false;
            slots.forEach((s) => {
                const sMs = s.startUtcMs;
                if (!sMs) return;
                hasData = true;
                const eMs = sMs + (s.recording.media_duration_seconds || 0) * 1000;
                if (sMs < startMs) startMs = sMs;
                if (eMs > endMs)   endMs   = eMs;
            });
            return hasData ? { startMs, endMs } : null;
        };

        /* Returns true when rec has any temporal overlap with the active window */
        const recOverlapsWindow = (rec, win) => {
            const rStart = Number(rec.recording_start_utc_ms) || 0;
            if (!rStart) return true; /* no UTC data — always show */
            const rEnd = rStart + (rec.media_duration_seconds || 0) * 1000;
            return rStart < win.endMs && rEnd > win.startMs;
        };

        /* ── Add a recording to the stage ── */
        const addSlot = (recording) => {
            if (slots.length >= MAX_SLOTS) {
                setSyncStatus(`Max ${MAX_SLOTS} videos reached.`, 'error');
                return;
            }

            /* Prevent duplicate */
            if (slots.some((s) => s.recording.relative_path === recording.relative_path)) {
                setSyncStatus('Already in player.', '');
                return;
            }

            const slot = createSlotObject(recording);

            slots.push(slot);

            const slotEl = buildSlotEl(slot, slots.length - 1);
            slotGrid.appendChild(slotEl);

            /* Wire video element — volume is controlled entirely through
               the gain node; videoEl.volume is always 1 so it never acts
               as a silent multiplier on top of the gain node */
            const videoEl = slotEl.querySelector('.mp-slot-video');
            slot.videoEl = videoEl;
            videoEl.volume = 1;
            videoEl.src = recording.media_url;

            /* Set initial pan track fill (pan=0 → --pan-pct:50% → no fill) */
            applyPan(slot.id, slot.pan);

            /* Hide loading overlay and auto-sync-play once metadata is ready */
            const overlay = document.getElementById(`overlay-${slot.id}`);
            videoEl.addEventListener('loadedmetadata', () => {
                if (overlay) overlay.classList.add('is-hidden');
                updateSyncBarDuration();

                /* If any other slot is already playing, seek this one to its
                   synced position and join playback immediately */
                const slotIdx = slots.indexOf(slot);
                const primary = slots[primarySlotIndex];
                if (primary && primary !== slot && primary.videoEl && !primary.videoEl.paused) {
                    const target = targetTimeForSlot(primary.videoEl.currentTime, slotIdx);
                    if (target >= 0) videoEl.currentTime = target;
                    videoEl.play().catch(() => {});
                }
            }, { once: true });

            videoEl.addEventListener('timeupdate', () => {
                const timeEl = document.getElementById(`time-${slot.id}`);
                if (timeEl) timeEl.textContent = fmtTime(videoEl.currentTime);
                if (slots[primarySlotIndex]?.id === slot.id) {
                    updateSyncBarPosition();
                }
            });

            videoEl.addEventListener('play', () => {
                refreshPlayPauseIcon(slot);
                refreshGlobalPlayPauseIcon();
                /* Wire audio graph on first play (requires user gesture) */
                resumeAudioCtx();
                wireAudioGraph(slot);
                /* Re-apply stored volume/pan now that graph is wired */
                applyVolume(slot.id, slot.volume);
                applyPan(slot.id, slot.pan);
            });
            videoEl.addEventListener('pause', () => { refreshPlayPauseIcon(slot); refreshGlobalPlayPauseIcon(); });
            videoEl.addEventListener('ended', () => { refreshPlayPauseIcon(slot); refreshGlobalPlayPauseIcon(); });

            refreshStageLayout();
            renderPickerList(); /* re-render to update "add" button states + overlap filter */
            updateSyncBarDuration();
            setSyncStatus(`Added "${recording.display_title || recording.channel}".`, 'synced');
            onSlotsChanged();
        };

        const refreshPlayPauseIcon = (slot) => {
            if (!slot.videoEl) return;
            const slotEl = slotGrid.querySelector(`[data-slot-id="${slot.id}"]`);
            if (!slotEl) return;
            const playBtn = slotEl.querySelector(`.mp-slot-play-btn`);
            if (!playBtn) return;
            const paused = slot.videoEl.paused || slot.videoEl.ended;
            const playIcon  = playBtn.querySelector('.mp-icon-play');
            const pauseIcon = playBtn.querySelector('.mp-icon-pause');
            if (playIcon)  playIcon.hidden  = !paused;
            if (pauseIcon) pauseIcon.hidden = paused;
        };

        /* ── Remove a slot ── */
        const removeSlot = (slotId) => {
            const idx = slots.findIndex((s) => s.id === slotId);
            if (idx < 0) return;

            const slot = slots[idx];
            if (slot.audioSourceNode) {
                try { slot.audioSourceNode.disconnect(); } catch (_e) {}
            }
            if (slot.videoEl) {
                slot.videoEl.pause();
                slot.videoEl.src = '';
            }

            const slotEl = slotGrid.querySelector(`.mp-slot[data-slot-id="${slotId}"]`);
            if (slotEl) slotEl.remove();

            slots.splice(idx, 1);

            if (primarySlotIndex >= slots.length) primarySlotIndex = Math.max(0, slots.length - 1);

            refreshStageLayout();
            renderPickerList();
            updateSyncBarDuration();

            if (slots.length === 0) setSyncStatus('', '');
            onSlotsChanged();
            /* renderPickerList() above already re-applies the overlap filter;
               when slots is now empty, getActiveWindowMs() returns null and
               all recordings become available again automatically */
        };

        /* ── Sync engine ── */
        const doSync = () => {
            if (slots.length < 2 || isSeeking) return;
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl || primary.videoEl.readyState < 1) return;
            const primaryTime = primary.videoEl.currentTime;

            slots.forEach((slot, i) => {
                if (i === primarySlotIndex) return;
                if (!slot.videoEl || slot.videoEl.readyState < 1) return;
                const target = targetTimeForSlot(primaryTime, i);
                if (target < 0) {
                    /* The peer recording hasn't started yet relative to primary */
                    if (!slot.videoEl.paused) slot.videoEl.pause();
                    return;
                }
                const drift = Math.abs(slot.videoEl.currentTime - target);
                if (drift > DRIFT_TOLERANCE_S) {
                    slot.videoEl.currentTime = target;
                }
            });
        };

        const startSyncTimer = () => {
            if (syncTimer !== null) return;
            syncTimer = window.setInterval(doSync, SYNC_INTERVAL_MS);
        };

        const stopSyncTimer = () => {
            if (syncTimer === null) return;
            window.clearInterval(syncTimer);
            syncTimer = null;
        };

        /* ── Sync bar ── */
        const updateSyncBarDuration = () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) { syncSeek.max = '0'; syncDurationEl.textContent = '0:00'; return; }
            const dur = primary.videoEl.duration;
            if (Number.isFinite(dur) && dur > 0) {
                syncSeek.max = String(dur);
                syncDurationEl.textContent = fmtTime(dur);
            }
        };

        const updateSyncBarPosition = () => {
            if (isSeeking) return;
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            const t = primary.videoEl.currentTime;
            syncSeek.value = String(t);
            syncTimeEl.textContent = fmtTime(t);
        };

        /* ── Play / Pause all ── */
        const isAnyPlaying = () => slots.some((s) => s.videoEl && !s.videoEl.paused);

        const refreshGlobalPlayPauseIcon = () => {
            if (!btnPlayPauseAll) return;
            const playing = isAnyPlaying();
            const playIcon  = btnPlayPauseAll.querySelector('.mp-icon-play');
            const pauseIcon = btnPlayPauseAll.querySelector('.mp-icon-pause');
            if (playIcon)  playIcon.hidden  = playing;
            if (pauseIcon) pauseIcon.hidden = !playing;
            btnPlayPauseAll.setAttribute('aria-label', playing ? 'Pause all videos' : 'Play all videos');
        };

        const playAll = () => {
            slots.forEach((s) => { if (s.videoEl && s.videoEl.paused) s.videoEl.play().catch(() => {}); });
            startSyncTimer();
            setSyncStatus('Playing.', 'synced');
            refreshGlobalPlayPauseIcon();
        };

        const pauseAll = () => {
            slots.forEach((s) => { if (s.videoEl && !s.videoEl.paused) s.videoEl.pause(); });
            setSyncStatus('Paused.', '');
            refreshGlobalPlayPauseIcon();
        };

        /* ── Full re-sync from primary ── */
        const reSyncAll = () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            const primaryTime = primary.videoEl.currentTime;
            slots.forEach((s, i) => {
                if (i === primarySlotIndex || !s.videoEl) return;
                const target = targetTimeForSlot(primaryTime, i);
                if (target >= 0) s.videoEl.currentTime = target;
            });
            setSyncStatus('Re-synced.', 'synced');
        };

        /* ── Global seek ── */
        const seekAllTo = (primaryTargetTime) => {
            const clamped = Math.max(0, primaryTargetTime);
            slots.forEach((s, i) => {
                if (!s.videoEl) return;
                if (i === primarySlotIndex) {
                    s.videoEl.currentTime = clamped;
                } else {
                    const target = targetTimeForSlot(clamped, i);
                    if (target >= 0) s.videoEl.currentTime = target;
                }
            });
        };

        /* ── Volume / Pan helpers ── */
        const fmtVolume = (v) => `${Math.round(v * 100)}%`;

        const fmtPan = (p) => {
            const v = Math.round(p * 100);
            if (v === 0) return 'C';
            return v < 0 ? `L${Math.abs(v)}` : `R${v}`;
        };

        const applyVolume = (slotId, rawValue) => {
            const slot = slots.find((s) => s.id === slotId);
            if (!slot) return;
            const vol = Math.max(0, Math.min(1, Number(rawValue) || 0));
            slot.volume = vol;
            /* Once the audio graph is wired, the gain node is the sole volume
               control; videoEl.volume stays at 1 so it never silently multiplies.
               Before the graph is wired (no AudioContext yet), fall back to
               videoEl.volume directly so the slider still has an effect. */
            if (slot.gainNode) {
                slot.gainNode.gain.value = vol;
            } else if (slot.videoEl) {
                slot.videoEl.volume = vol;
            }
            const label = document.getElementById(`vol-val-${slotId}`);
            if (label) label.textContent = fmtVolume(vol);
        };

        const applyPan = (slotId, rawValue) => {
            const slot = slots.find((s) => s.id === slotId);
            if (!slot) return;
            const pan = Math.max(-1, Math.min(1, Number(rawValue) || 0));
            slot.pan = pan;
            if (slot.pannerNode) {
                slot.pannerNode.pan.value = pan;
            }
            /* Update track fill: map -1..+1 to 0%..100% for --pan-pct */
            const slider = slotGrid.querySelector(`.mp-pan-slider[data-slot-id="${slotId}"]`);
            if (slider) slider.style.setProperty('--pan-pct', `${(pan + 1) * 50}%`);
            const label = document.getElementById(`pan-val-${slotId}`);
            if (label) label.textContent = fmtPan(pan);
        };

        /* Wire the Web Audio graph for a slot: video → gain → panner → destination.
         * This is called after the video element exists and the user has interacted
         * (so AudioContext can be created/resumed). Each video element can only be
         * connected once, so we guard with audioSourceNode. */
        const wireAudioGraph = (slot) => {
            if (slot.audioSourceNode || !slot.videoEl) return;
            const ctx = getAudioCtx();
            if (!ctx) return;
            try {
                const source = ctx.createMediaElementSource(slot.videoEl);
                const gain   = ctx.createGain();
                const panner = ctx.createStereoPanner();
                gain.gain.value   = slot.volume;
                panner.pan.value  = slot.pan;
                source.connect(gain);
                gain.connect(panner);
                panner.connect(ctx.destination);
                slot.audioSourceNode = source;
                slot.gainNode        = gain;
                slot.pannerNode      = panner;
                /* Ensure the element-level volume is full so it never mutes
                   the gain node's output as a silent multiplier */
                slot.videoEl.volume = 1;
            } catch (_e) {
                /* Older browsers without StereoPannerNode — graceful fallback */
            }
        };

        /* ── User offset change ── */
        const applyUserOffset = (slotId, newOffsetSecs) => {
            const slot = slots.find((s) => s.id === slotId);
            if (!slot) return;
            slot.userOffsetSecs = Number(newOffsetSecs) || 0;
            /* Immediately re-sync */
            reSyncAll();
            const input = slotGrid.querySelector(`.mp-offset-input[data-slot-id="${slotId}"]`);
            if (input) {
                input.classList.toggle('is-nonzero', slot.userOffsetSecs !== 0);
            }
        };

        /* ── Picker rendering ── */
        const buildChannelDays = (recordings) => {
            const map = {};
            recordings.forEach((r) => {
                const ch = r.channel || 'unknown';
                if (!map[ch]) map[ch] = new Set();
                map[ch].add(r.day || 'unknown');
            });
            const out = {};
            for (const [ch, days] of Object.entries(map)) {
                out[ch] = Array.from(days).sort((a, b) => b.localeCompare(a));
            }
            return out;
        };

        const populatePickerFilters = (channels) => {
            const prevCh  = filterChannel.value || 'all';
            const prevDay = filterDay.value || 'all';
            filterChannel.innerHTML = '<option value="all">All channels</option>';
            const sorted = [...channels].sort((a, b) => a.localeCompare(b));
            sorted.forEach((ch) => {
                const opt = document.createElement('option');
                opt.value = ch; opt.textContent = ch;
                filterChannel.appendChild(opt);
            });
            filterChannel.value = sorted.includes(prevCh) ? prevCh : 'all';
            populateDayFilter(prevDay);
        };

        const populateDayFilter = (prevDay = 'all') => {
            const ch = filterChannel.value || 'all';
            const daySet = new Set();
            if (ch === 'all') {
                Object.values(channelDays).forEach((days) => days.forEach((d) => daySet.add(d)));
            } else {
                (channelDays[ch] || []).forEach((d) => daySet.add(d));
            }
            const dayVals = Array.from(daySet).sort((a, b) => b.localeCompare(a));
            filterDay.innerHTML = '<option value="all">All days</option>';
            dayVals.forEach((d) => {
                const opt = document.createElement('option');
                opt.value = d; opt.textContent = d;
                filterDay.appendChild(opt);
            });
            filterDay.value = dayVals.includes(prevDay) ? prevDay : 'all';
        };

        const renderPickerList = () => {
            const ch     = filterChannel.value || 'all';
            const day    = filterDay.value || 'all';
            const query  = (filterSearch.value || '').trim().toLowerCase();
            const inSlot = new Set(slots.map((s) => s.recording.relative_path));
            const win    = getActiveWindowMs(); /* null when no slots loaded */

            const filtered = allRecordings.filter((r) => {
                if (ch  !== 'all' && r.channel !== ch)  return false;
                if (day !== 'all' && r.day     !== day) return false;
                if (query) {
                    const haystack = `${r.channel} ${r.display_title || ''} ${r.file_name || ''}`.toLowerCase();
                    if (!haystack.includes(query)) return false;
                }
                /* Once a slot is loaded, hide recordings with no time overlap */
                if (win && !inSlot.has(r.relative_path) && !recOverlapsWindow(r, win)) return false;
                return true;
            });

            if (filtered.length === 0) {
                pickerList.innerHTML = '';
                pickerEmpty.hidden = false;
                pickerEmpty.textContent = allRecordings.length === 0 ? 'Loading recordings…' : 'No recordings match.';
                return;
            }

            pickerEmpty.hidden = true;

            const fragment = document.createDocumentFragment();
            filtered.forEach((rec) => {
                const alreadyAdded = inSlot.has(rec.relative_path);
                const slotsFull    = slots.length >= MAX_SLOTS;
                const thumb = escHtml(rec.thumbnail_url || FALLBACK_THUMB);
                const title = escHtml(rec.display_title || rec.file_name || 'recording');
                const sub   = escHtml(`${rec.channel} · ${rec.day}${rec.is_live ? ' · LIVE' : ''}`);
                const startedAt = rec.started_at
                    ? fmtDateTime(rec.started_at)
                    : (rec.recorded_at ? fmtDateTime(rec.recorded_at) : '');

                const item = document.createElement('div');
                item.className = 'mp-pick-item' + (alreadyAdded ? ' is-selected' : '') + (rec.is_live ? ' is-live' : '');
                item.role = 'listitem';
                item.dataset.path = rec.relative_path;
                item.innerHTML = `
                    <img class="mp-pick-thumb" src="${thumb}" alt="" loading="lazy" decoding="async">
                    <div class="mp-pick-meta">
                        <p class="mp-pick-title" title="${title}">${title}</p>
                        <p class="mp-pick-sub">${sub}${startedAt ? ' · ' + escHtml(startedAt) : ''}</p>
                    </div>
                    <div class="mp-pick-badges">
                        <button
                            type="button"
                            class="mp-pick-add-btn ${alreadyAdded ? 'secondary' : ''}"
                            data-path="${escHtml(rec.relative_path)}"
                            aria-label="${alreadyAdded ? 'Already added' : 'Add to player'}"
                            ${alreadyAdded || slotsFull ? 'disabled' : ''}
                        >${alreadyAdded ? 'Added' : 'Add'}</button>
                    </div>
                `;
                fragment.appendChild(item);
            });

            pickerList.innerHTML = '';
            pickerList.appendChild(fragment);
        };

        /* ────────────────────────────────────────────────────────────
         * CHAT ENGINE
         * ──────────────────────────────────────────────────────────── */

        /* ── Chat panel open/close ── */
        const isChatOpen = () => Boolean(stageChatWrap && stageChatWrap.classList.contains(MP_CHAT_OPEN_CLASS));

        const clampChatWidth = (rawWidth) => {
            const vw = Math.max(window.innerWidth || 0, 640);
            const max = Math.max(CHAT_MIN_WIDTH_PX + 40, Math.floor(vw * CHAT_MAX_RATIO));
            const fallback = Math.round(vw * CHAT_DEFAULT_RATIO);
            const parsed = Number.parseInt(String(rawWidth), 10);
            const candidate = Number.isFinite(parsed) ? parsed : fallback;
            return Math.max(CHAT_MIN_WIDTH_PX, Math.min(max, candidate));
        };

        const readPersistedChatWidth = () => {
            try {
                const raw = window.localStorage.getItem(CHAT_WIDTH_KEY);
                return raw ? clampChatWidth(raw) : clampChatWidth(null);
            } catch (_e) { return clampChatWidth(null); }
        };

        const applyChatWidth = (rawWidth, persist = true) => {
            if (!stageChatWrap) return;
            const w = clampChatWidth(rawWidth);
            stageChatWrap.style.setProperty('--mp-chat-width', `${w}px`);
            if (chatResizeHandle) chatResizeHandle.setAttribute('aria-valuenow', String(w));
            if (persist) {
                try { window.localStorage.setItem(CHAT_WIDTH_KEY, String(w)); } catch (_e) {}
            }
        };

        const updateChatToggleState = () => {
            if (!chatToggleBtn) return;
            const open = isChatOpen();
            chatToggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
            chatToggleBtn.classList.toggle('is-active', open);
            const labelEl = chatToggleBtn.querySelector('.panel-toggle-text');
            if (labelEl) {
                labelEl.textContent = open
                    ? (labelEl.getAttribute('data-expanded-label') || 'Hide Chat')
                    : (labelEl.getAttribute('data-collapsed-label') || 'Show Chat');
            }
            chatToggleBtn.setAttribute('aria-label', open ? 'Hide chat panel' : 'Show chat panel');
            if (chatResizeHandle) chatResizeHandle.hidden = !open;
            if (chatPanel) chatPanel.hidden = !open;
        };

        const setChatOpen = (open, persist = true) => {
            if (!stageChatWrap) return;
            stageChatWrap.classList.toggle(MP_CHAT_OPEN_CLASS, Boolean(open));
            if (isMobileViewport()) {
                /* Mobile: show/hide as a fixed overlay from the right */
                if (open) {
                    /* Close picker overlay first */
                    if (pickerPanel && pickerPanel.classList.contains('is-open')) {
                        pickerPanel.classList.remove('is-open');
                    }
                    showMpOverlay(MP_OVERLAY_CHAT);
                } else {
                    if (mpOverlayOwner === MP_OVERLAY_CHAT) hideMpOverlay();
                }
            }
            updateChatToggleState();
            if (open) {
                applyChatWidth(readPersistedChatWidth(), false);
                scheduleChatPoll();
            } else {
                stopChatPoll();
            }
            if (persist) {
                try { window.localStorage.setItem(CHAT_PANEL_KEY, open ? '1' : '0'); } catch (_e) {}
            }
        };

        /* Restore persisted chat open state — deferred to boot (after all functions defined) */
        /* [see boot section] */

        if (chatToggleBtn) {
            chatToggleBtn.addEventListener('click', () => setChatOpen(!isChatOpen(), true));
        }

        if (chatCloseBtn) {
            chatCloseBtn.addEventListener('click', () => setChatOpen(false, true));
        }

        /* ── Chat resize handle (pointer drag) ── */
        if (chatResizeHandle) {
            chatResizeHandle.setAttribute('aria-valuemin', String(CHAT_MIN_WIDTH_PX));

            chatResizeHandle.addEventListener('pointerdown', (e) => {
                if (chatResizeActive) return;
                chatResizeActive = true;
                chatResizePointerId = e.pointerId;
                chatResizeHandle.setPointerCapture(e.pointerId);
                document.body.classList.add('is-mp-chat-resizing');
            });

            chatResizeHandle.addEventListener('pointermove', (e) => {
                if (!chatResizeActive || e.pointerId !== chatResizePointerId) return;
                if (!stageChatWrap) return;
                const bounds = stageChatWrap.getBoundingClientRect();
                if (bounds.width <= 0) return;
                const newWidth = Math.round(bounds.right - e.clientX);
                applyChatWidth(newWidth, false);
            });

            const stopChatResize = () => {
                if (!chatResizeActive) return;
                chatResizeActive = false;
                chatResizePointerId = null;
                document.body.classList.remove('is-mp-chat-resizing');
                /* persist final width */
                if (stageChatWrap) {
                    const cur = getComputedStyle(stageChatWrap).getPropertyValue('--mp-chat-width').trim();
                    applyChatWidth(cur, true);
                }
            };

            chatResizeHandle.addEventListener('pointerup', stopChatResize);
            chatResizeHandle.addEventListener('pointercancel', stopChatResize);

            /* Keyboard: arrow keys adjust width */
            chatResizeHandle.addEventListener('keydown', (e) => {
                const step = e.shiftKey ? 40 : 10;
                if (!stageChatWrap) return;
                const cur = getComputedStyle(stageChatWrap).getPropertyValue('--mp-chat-width').trim();
                const cur_w = clampChatWidth(cur);
                if (e.key === 'ArrowLeft')  { e.preventDefault(); applyChatWidth(cur_w + step, true); }
                if (e.key === 'ArrowRight') { e.preventDefault(); applyChatWidth(cur_w - step, true); }
            });
        }

        /* ── Chat mode (merged / columns) ── */
        const setChatMode = (mode, persist = true) => {
            chatMode = (mode === 'columns') ? 'columns' : 'merged';
            if (chatMergedEl)  chatMergedEl.hidden  = (chatMode !== 'merged');
            if (chatColumnsEl) chatColumnsEl.hidden = (chatMode !== 'columns');
            /* Update mode buttons */
            document.querySelectorAll('.mp-chat-mode-btn').forEach((btn) => {
                const m = btn.getAttribute('data-chat-mode');
                const active = m === chatMode;
                btn.setAttribute('aria-pressed', active ? 'true' : 'false');
                btn.classList.toggle('is-active', active);
            });
            if (persist) {
                try { window.localStorage.setItem(CHAT_MODE_KEY, chatMode); } catch (_e) {}
            }
            renderChatMessages();
            window.requestAnimationFrame(() => updateJumpBtn());
        };

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.mp-chat-mode-btn');
            if (!btn) return;
            setChatMode(btn.getAttribute('data-chat-mode'));
        });

        /* Restore persisted mode */
        (() => {
            try {
                const raw = window.localStorage.getItem(CHAT_MODE_KEY);
                if (raw === 'columns' || raw === 'merged') chatMode = raw;
            } catch (_e) {}
        })();

        /* ── Per-slot sidebar mode ── */
        const isSidebarMode = () => chatSidebarMode;

        const setSidebarMode = (enabled, persist = true) => {
            chatSidebarMode = Boolean(enabled);
            if (mpPage) mpPage.classList.toggle(MP_SIDEBAR_CLASS, chatSidebarMode);
            if (chatSidebarToggle) {
                chatSidebarToggle.setAttribute('aria-pressed', chatSidebarMode ? 'true' : 'false');
                chatSidebarToggle.classList.toggle('is-active', chatSidebarMode);
            }
            /* Rebuild slot sidebars */
            rebuildSlotSidebars();
            if (persist) {
                try { window.localStorage.setItem(CHAT_SIDEBAR_KEY, chatSidebarMode ? '1' : '0'); } catch (_e) {}
            }
        };

        if (chatSidebarToggle) {
            chatSidebarToggle.addEventListener('click', () => setSidebarMode(!chatSidebarMode));
        }

        /* Restore persisted sidebar state */
        (() => {
            try {
                const raw = window.localStorage.getItem(CHAT_SIDEBAR_KEY);
                if (raw === '1' || raw === 'true') chatSidebarMode = true;
            } catch (_e) {}
        })();

        /* ── Channel selector ── */
        const readPersistedEnabledChannels = () => {
            try {
                const raw = window.localStorage.getItem(CHAT_CHANNELS_KEY);
                if (!raw) return null;
                const arr = JSON.parse(raw);
                if (Array.isArray(arr)) return new Set(arr.map(String));
                return null;
            } catch (_e) { return null; }
        };

        const persistEnabledChannels = () => {
            try {
                window.localStorage.setItem(CHAT_CHANNELS_KEY,
                    JSON.stringify(Array.from(chatEnabledChannels)));
            } catch (_e) {}
        };

        const renderChannelSelector = () => {
            if (!chatChannelList) return;
            /* Collect channels currently in slots */
            const channels = [...new Set(slots.map((s) => s.recording.channel).filter(Boolean))];

            if (channels.length === 0) {
                chatChannelList.innerHTML = '<span class="mp-chat-no-channels">No videos loaded.</span>';
                return;
            }

            /* Enable all by default for new channels */
            channels.forEach((ch) => {
                if (!chatEnabledChannels.has(ch)) chatEnabledChannels.add(ch);
            });

            chatChannelList.innerHTML = '';
            channels.forEach((ch) => {
                const color = getChannelColor(ch);
                const checked = chatEnabledChannels.has(ch) ? 'checked' : '';
                const label = document.createElement('label');
                label.className = 'mp-chat-channel-check';
                label.innerHTML = `
                    <input type="checkbox" class="mp-chat-ch-checkbox" data-channel="${escHtml(ch)}" ${checked}>
                    <span class="mp-chat-ch-dot" style="background:${color}"></span>
                    <span class="mp-chat-ch-name">${escHtml(ch)}</span>
                `;
                chatChannelList.appendChild(label);
            });
        };

        chatChannelList && chatChannelList.addEventListener('change', (e) => {
            if (!e.target.classList.contains('mp-chat-ch-checkbox')) return;
            const ch = e.target.getAttribute('data-channel');
            if (!ch) return;
            if (e.target.checked) chatEnabledChannels.add(ch);
            else chatEnabledChannels.delete(ch);
            persistEnabledChannels();
            renderChatMessages();
        });

        /* ── Slot sidebar chat panels ── */
        const rebuildSlotSidebars = () => {
            slots.forEach((slot) => {
                const slotEl = slotGrid.querySelector(`.mp-slot[data-slot-id="${slot.id}"]`);
                if (!slotEl) return;
                const existing = slotEl.querySelector('.mp-slot-chat-sidebar');
                if (!chatSidebarMode) {
                    if (existing) existing.remove();
                    return;
                }
                if (!existing) {
                    const sidebar = document.createElement('div');
                    sidebar.className = 'mp-slot-chat-sidebar';
                    sidebar.dataset.slotId = slot.id;
                    sidebar.innerHTML = `
                        <div class="mp-slot-chat-sidebar-inner">
                            <div class="mp-slot-chat-list" id="slot-chat-${slot.id}"
                                role="log" aria-label="Chat for ${escHtml(slot.recording.channel)}"
                                aria-live="polite"></div>
                        </div>
                    `;
                    slotEl.appendChild(sidebar);
                }
            });
            /* Render updated messages into sidebars */
            renderSlotSidebarMessages();
        };

        /* ── Playback position → UTC ms ── */
        const getPrimaryUtcMs = () => {
            const primary = slots[primarySlotIndex] || slots[0];
            if (!primary || !primary.startUtcMs || !primary.videoEl) return null;
            return Math.round(primary.startUtcMs + primary.videoEl.currentTime * 1000);
        };

        /* ── Chat message rendering helpers ── */
        const escHtmlChat = (v) => String(v ?? '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

        const fmtChatTime = (utcMs) => {
            if (!utcMs) return '';
            const d = new Date(utcMs);
            return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        };

        const buildChatMessageEl = (msg, channelKey, showChannel) => {
            const color = getChannelColor(channelKey);
            const el = document.createElement('div');
            el.className = 'mp-chat-item';
            el.dataset.utcMs = String(msg.utc_ms);
            let channelBadge = '';
            if (showChannel) {
                channelBadge = `<span class="mp-chat-channel-badge" style="border-color:${color};color:${color}">${escHtmlChat(channelKey)}</span>`;
            }
            el.innerHTML = `
                ${channelBadge}
                <span class="mp-chat-author" style="color:${msg.color || color}">${escHtmlChat(msg.author)}</span>
                <span class="mp-chat-colon" aria-hidden="true">:</span>
                <span class="mp-chat-text">${escHtmlChat(msg.text)}</span>
            `;
            return el;
        };

        const scrollChatToBottom = (listEl) => {
            if (!listEl) return;
            listEl.scrollTop = listEl.scrollHeight;
        };

        const isChatNearBottom = (listEl) => {
            if (!listEl) return true;
            return (listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight) < 80;
        };

        /* ── Jump button: shown when any visible chat list is not at the bottom ── */
        const updateJumpBtn = () => {
            if (!chatJumpBtn) return;
            let anyScrolledUp = false;
            if (chatMode === 'merged') {
                anyScrolledUp = !isChatNearBottom(chatMergedList);
            } else {
                /* columns: check every column list */
                chatColumnsEl && chatColumnsEl.querySelectorAll('.mp-chat-list').forEach((el) => {
                    if (!isChatNearBottom(el)) anyScrolledUp = true;
                });
            }
            chatJumpBtn.hidden = !anyScrolledUp;
        };

        /* ── Render merged view ── */
        const renderMergedChat = () => {
            if (!chatMergedList) return;
            const wasNearBottom = isChatNearBottom(chatMergedList);

            /* Collect all enabled messages, sorted by utc_ms */
            const allMsgs = [];
            for (const [ch, data] of Object.entries(chatData)) {
                if (!chatEnabledChannels.has(ch)) continue;
                if (!data || !Array.isArray(data.messages)) continue;
                data.messages.forEach((m) => allMsgs.push({ ...m, _channel: ch }));
            }
            allMsgs.sort((a, b) => a.utc_ms - b.utc_ms);

            chatMergedList.innerHTML = '';
            const fragment = document.createDocumentFragment();
            allMsgs.forEach((m) => {
                fragment.appendChild(buildChatMessageEl(m, m._channel, true));
            });
            chatMergedList.appendChild(fragment);

            if (wasNearBottom || chatAutoFollow) {
                window.requestAnimationFrame(() => {
                    scrollChatToBottom(chatMergedList);
                    updateJumpBtn();
                });
            } else {
                updateJumpBtn();
            }
        };

        /* ── Render columns view ── */
        const renderColumnsChat = () => {
            if (!chatColumnsEl) return;

            const channels = [...new Set(slots.map((s) => s.recording.channel).filter(Boolean))]
                .filter((ch) => chatEnabledChannels.has(ch));

            /* Build a set of channel keys currently rendered */
            const renderedKeys = new Set(
                Array.from(chatColumnsEl.querySelectorAll('.mp-chat-column'))
                    .map((el) => el.dataset.channel)
            );
            const wantedKeys = new Set(channels);

            /* Remove columns no longer needed */
            chatColumnsEl.querySelectorAll('.mp-chat-column').forEach((el) => {
                if (!wantedKeys.has(el.dataset.channel)) el.remove();
            });

            /* Add or update each channel column */
            channels.forEach((ch) => {
                const data = chatData[ch];
                const color = getChannelColor(ch);

                let col = chatColumnsEl.querySelector(`.mp-chat-column[data-channel="${CSS.escape(ch)}"]`);
                let list;

                if (!col) {
                    /* Create fresh column */
                    col = document.createElement('div');
                    col.className = 'mp-chat-column';
                    col.dataset.channel = ch;
                    const header = document.createElement('div');
                    header.className = 'mp-chat-col-header';
                    header.innerHTML = `<span class="mp-chat-ch-dot" style="background:${color}"></span>
                        <span class="mp-chat-col-name">${escHtmlChat(ch)}</span>`;
                    list = document.createElement('div');
                    list.className = 'mp-chat-list mp-chat-col-list';
                    list.setAttribute('role', 'log');
                    list.setAttribute('aria-label', `Chat for ${escHtmlChat(ch)}`);
                    list.setAttribute('aria-live', 'polite');
                    col.appendChild(header);
                    col.appendChild(list);
                    chatColumnsEl.appendChild(col);
                } else {
                    list = col.querySelector('.mp-chat-list');
                }

                if (!list) return;

                /* Snapshot scroll state BEFORE re-rendering */
                const wasNearBottom = !renderedKeys.has(ch) || isChatNearBottom(list);

                list.innerHTML = '';
                if (data && Array.isArray(data.messages)) {
                    const fragment = document.createDocumentFragment();
                    data.messages.forEach((m) => fragment.appendChild(buildChatMessageEl(m, ch, false)));
                    list.appendChild(fragment);
                }

                /* Scroll after the browser has laid out the new content */
                if (wasNearBottom) {
                    window.requestAnimationFrame(() => scrollChatToBottom(list));
                }
            });

            window.requestAnimationFrame(() => updateJumpBtn());
        };

        /* ── Render per-slot sidebars ── */
        const renderSlotSidebarMessages = () => {
            if (!chatSidebarMode) return;
            slots.forEach((slot) => {
                const ch = slot.recording.channel;
