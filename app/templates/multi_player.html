<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#141414">
    <meta name="application-name" content="VStreamware">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="VStreamware">
    <title>Multi-Player – VStreamware</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/multi_player.css') }}">
</head>
<body class="browser-page mp-root-body" data-transcode-status-url="{{ url_for('dashboard.transcode_queue_status') }}">
    <main class="container mp-main">
        <!-- ── Page header ── -->
        <header class="page-header browser-header">
            <h1 class="app-title">
                <a class="app-title-link" href="{{ url_for('dashboard.index') }}" aria-label="Go to home">
                    <img class="app-title-icon" src="{{ url_for('static', filename='icons/icon-64.png') }}" alt="VStreamware icon">
                    <span>VStreamware</span>
                </a>
            </h1>
            <div class="header-actions">
                <div class="header-transcode-indicator" id="header-transcode-indicator" hidden role="status" aria-live="polite" aria-atomic="true">
                    <span class="header-transcode-dot" aria-hidden="true"></span>
                    <span class="header-transcode-label" id="header-transcode-label">Transcoding</span>
                </div>
                <a class="header-icon-link" href="{{ url_for('dashboard.index') }}" aria-label="Go to home">
                    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 10.5 12 3l9 7.5"></path>
                        <path d="M5 9.5V21h14V9.5"></path>
                    </svg>
                    <span class="sr-only">Home</span>
                </a>
            </div>
        </header>

        <!-- ── Multi-player shell ── -->
        <div class="multi-player-page">

            <!-- Toolbar -->
            <div class="mp-toolbar" role="toolbar" aria-label="Multi-player controls">
                <button
                    type="button"
                    class="panel-hamburger mp-picker-toggle"
                    id="mp-picker-toggle"
                    aria-controls="mp-picker-panel"
                    aria-expanded="true"
                    aria-label="Hide recordings picker"
                >
                    <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect width="18" height="18" x="3" y="3" rx="2"/>
                        <path d="M9 3v18"/>
                    </svg>
                    <span class="panel-toggle-text" data-expanded-label="Hide Picker" data-collapsed-label="Show Picker">Hide Picker</span>
                </button>
                <span class="mp-toolbar-sep" aria-hidden="true"></span>
                <div class="mp-toolbar-actions">
                    <button type="button" id="mp-play-all" aria-label="Play all videos">
                        <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" stroke="none" aria-hidden="true" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M8 5v14l11-7z"/></svg>
                        Play All
                    </button>
                    <button type="button" id="mp-pause-all" class="secondary" aria-label="Pause all videos">
                        <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" stroke="none" aria-hidden="true" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        Pause All
                    </button>
                    <button type="button" id="mp-sync-now" class="secondary" aria-label="Re-sync all videos to the primary video's current time">
                        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
                        Re-sync
                    </button>
                    <button type="button" id="mp-clear-all" class="danger" aria-label="Remove all videos from the player">Clear All</button>
                </div>
                <span class="mp-sync-status" id="mp-sync-status" aria-live="polite"></span>
            </div>

            <!-- Body: picker + stage -->
            <div class="mp-body">

                <!-- ── Left: recording picker ── -->
                <aside class="mp-picker-panel" id="mp-picker-panel" aria-label="Recording picker">
                    <div class="mp-picker-header">
                        <div class="mp-picker-header-title-row">
                            <h3>Pick Recordings</h3>
                        </div>
                        <div class="mp-picker-filters">
                            <select id="mp-filter-channel" aria-label="Filter by channel">
                                <option value="all">All channels</option>
                            </select>
                            <select id="mp-filter-day" aria-label="Filter by day">
                                <option value="all">All days</option>
                            </select>
                        </div>
                        <div class="mp-picker-search">
                            <input type="search" id="mp-filter-search" placeholder="Search titles…" autocomplete="off" spellcheck="false" aria-label="Search recordings">
                        </div>
                    </div>
                    <div class="mp-picker-list" id="mp-picker-list" role="list" aria-label="Available recordings">
                        <p class="mp-picker-empty" id="mp-picker-empty">Loading recordings…</p>
                    </div>
                </aside>

                <!-- ── Right: video stage ── -->
                <section class="mp-stage" aria-label="Video stage">

                    <!-- Global sync bar -->
                    <div class="mp-sync-bar" id="mp-sync-bar" hidden aria-label="Global playback sync">
                        <span class="mp-sync-bar-label">Sync position</span>
                        <span class="mp-sync-time" id="mp-sync-time">0:00</span>
                        <input
                            type="range"
                            id="mp-sync-seek"
                            class="mp-sync-seek"
                            min="0"
                            max="0"
                            step="0.1"
                            value="0"
                            aria-label="Global sync seek"
                        >
                        <span class="mp-sync-time" id="mp-sync-duration">0:00</span>
                        <div class="mp-sync-actions">
                            <button type="button" id="mp-seek-back" class="secondary" aria-label="Seek back 10 seconds">−10s</button>
                            <button type="button" id="mp-seek-forward" class="secondary" aria-label="Seek forward 10 seconds">+10s</button>
                        </div>
                    </div>

                    <!-- Empty placeholder: removed from layout when hidden -->
                    <div class="mp-stage-empty" id="mp-stage-empty">
                        <div>
                            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#4f86b4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:block;margin:0 auto 12px"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                            <p>Add recordings from the left panel to start watching.</p>
                            <p style="font-size:12px;margin-top:4px">Up to 4 videos can be played at once. Use the volume sliders to control audio per slot.</p>
                        </div>
                    </div>

                    <!-- Slot grid: takes full stage space when visible -->
                    <div class="mp-slot-grid" id="mp-slot-grid" data-count="0" hidden></div>

                </section>
            </div>
        </div>
    </main>

    <script>
    (() => {
        'use strict';

        /* ── Constants ── */
        const MAX_SLOTS       = 4;
        const SYNC_INTERVAL_MS = 500;   /* how often we nudge drifted players */
        const DRIFT_TOLERANCE_S = 0.35; /* seconds of drift before correcting */
        const SEEK_STEP_S      = 10;
        const FALLBACK_THUMB   = {{ url_for('static', filename='icons/icon-64.png') | tojson }};
        const RECORDINGS_INDEX = {{ url_for('dashboard.recordings_index') | tojson }};
        const DISPLAY_TZ_PREF  = {{ display_timezone | tojson }};

        /* ── State ── */
        let allRecordings    = [];   /* full catalog from API */
        let channelDays      = {};
        let slots            = [];   /* array of slot objects (max 4) */
        let primarySlotIndex = 0;    /* which slot drives global time */
        let syncTimer        = null;
        let isSeeking        = false;
        let catalogSignature = '';

        /* ── DOM refs ── */
        const pickerList     = document.getElementById('mp-picker-list');
        const pickerEmpty    = document.getElementById('mp-picker-empty');
        const filterChannel  = document.getElementById('mp-filter-channel');
        const filterDay      = document.getElementById('mp-filter-day');
        const filterSearch   = document.getElementById('mp-filter-search');
        const slotGrid       = document.getElementById('mp-slot-grid');
        const stageEmpty     = document.getElementById('mp-stage-empty');
        const syncBar        = document.getElementById('mp-sync-bar');
        const syncTimeEl     = document.getElementById('mp-sync-time');
        const syncDurationEl = document.getElementById('mp-sync-duration');
        const syncSeek       = document.getElementById('mp-sync-seek');
        const syncStatusEl   = document.getElementById('mp-sync-status');
        const btnPlayAll     = document.getElementById('mp-play-all');
        const btnPauseAll    = document.getElementById('mp-pause-all');
        const btnSyncNow     = document.getElementById('mp-sync-now');
        const btnClearAll    = document.getElementById('mp-clear-all');
        const btnSeekBack    = document.getElementById('mp-seek-back');
        const btnSeekFwd     = document.getElementById('mp-seek-forward');
        const pickerToggle   = document.getElementById('mp-picker-toggle');

        /* ── Picker collapse (mirrors saved-panel toggle pattern) ── */
        const PICKER_COLLAPSE_KEY  = 'vstreamware.mp-picker-collapsed';
        const PICKER_COLLAPSE_CLASS = 'mp-picker-collapsed';

        const mpPage = document.querySelector('.multi-player-page');

        const updatePickerToggleState = () => {
            if (!pickerToggle || !mpPage) return;
            const collapsed = mpPage.classList.contains(PICKER_COLLAPSE_CLASS);
            pickerToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            pickerToggle.classList.toggle('is-active', !collapsed);
            const labelEl = pickerToggle.querySelector('.panel-toggle-text');
            if (labelEl) {
                const nextText = collapsed
                    ? (labelEl.getAttribute('data-collapsed-label') || 'Show Picker')
                    : (labelEl.getAttribute('data-expanded-label')  || 'Hide Picker');
                labelEl.textContent = nextText;
            }
            pickerToggle.setAttribute('aria-label',
                collapsed ? 'Show recordings picker' : 'Hide recordings picker');
        };

        const setPickerCollapsed = (collapsed, persist = false) => {
            if (!mpPage) return;
            mpPage.classList.toggle(PICKER_COLLAPSE_CLASS, Boolean(collapsed));
            updatePickerToggleState();
            if (persist) {
                try { window.localStorage.setItem(PICKER_COLLAPSE_KEY, collapsed ? '1' : '0'); }
                catch (_e) {}
            }
        };

        /* Restore persisted state on page load */
        (() => {
            try {
                const raw = window.localStorage.getItem(PICKER_COLLAPSE_KEY);
                const wasCollapsed = raw === '1' || raw === 'true';
                setPickerCollapsed(wasCollapsed, false);
            } catch (_e) {}
        })();

        if (pickerToggle) {
            pickerToggle.addEventListener('click', () => {
                const nowCollapsed = !mpPage.classList.contains(PICKER_COLLAPSE_CLASS);
                setPickerCollapsed(nowCollapsed, true);
            });
        }

        /* ── Helpers ── */
        const escHtml = (v) => String(v ?? '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

        const fmtTime = (secs) => {
            if (!Number.isFinite(secs) || secs < 0) return '0:00';
            const s = Math.floor(secs);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            return `${m}:${String(sec).padStart(2, '0')}`;
        };

        const fmtDateTime = (isoStr) => {
            if (!isoStr) return '';
            const d = new Date(isoStr);
            if (isNaN(d.getTime())) return isoStr;
            const tz = (DISPLAY_TZ_PREF && DISPLAY_TZ_PREF !== 'auto') ? DISPLAY_TZ_PREF : undefined;
            try { return d.toLocaleString(undefined, tz ? { timeZone: tz } : undefined); }
            catch { return d.toLocaleString(); }
        };

        const setSyncStatus = (msg, kind = '') => {
            if (!syncStatusEl) return;
            syncStatusEl.textContent = msg;
            syncStatusEl.className = 'mp-sync-status'
                + (kind === 'synced' ? ' is-synced' : kind === 'error' ? ' is-error' : '');
        };

        /* ── UTC-wall-clock → playback-seconds conversion ──
         *
         * Each recording has a recording_start_utc_ms value.  When all recordings
         * originate from the same real-world event (e.g. a Twitch stream), they
         * all share the same wall-clock timeline.  We pick the PRIMARY slot's
         * recording_start_utc_ms as the "epoch" and express every other recording's
         * position as:
         *
         *   playbackSeconds = wallClockOffsetFromEpoch + slotUserOffsetSeconds
         *
         * where wallClockOffsetFromEpoch = (slot.startUtcMs - epoch) / 1000.
         *
         * If a recording has no startUtcMs we fall back to treating it as
         * zero-offset (i.e. all videos started at the same time).
         */
        const getEpochMs = () => {
            if (slots.length === 0) return null;
            const primary = slots[primarySlotIndex] || slots[0];
            return primary.startUtcMs || null;
        };

        /* Compute the wall-clock "absolute" seconds for a given playback position
         * in the primary slot. Returns null if epoch is unavailable. */
        const primaryPlaybackToWallClock = (playbackSecs) => {
            const epoch = getEpochMs();
            if (epoch === null) return null;
            return epoch / 1000 + playbackSecs;
        };

        /* For a given slot, what playback position corresponds to a wall-clock
         * absolute second (from primaryPlaybackToWallClock)? */
        const wallClockToSlotPlayback = (slot, wallClockSecs) => {
            if (!slot.startUtcMs || !getEpochMs()) {
                /* No UTC info – just mirror the primary position */
                return wallClockSecs - (getEpochMs() || 0) / 1000;
            }
            const slotOffsetSecs = (slot.startUtcMs - getEpochMs()) / 1000;
            return wallClockSecs - slotOffsetSecs / 1 + slot.userOffsetSecs;
        };

        /* Simpler form: given the PRIMARY slot's currentTime, what time should
         * a peer slot be at (accounting for UTC offsets + user tweak)? */
        const targetTimeForSlot = (primaryCurrentTime, slotIndex) => {
            const primary = slots[primarySlotIndex] || slots[0];
            const slot    = slots[slotIndex];
            if (!slot || slot === primary) return primaryCurrentTime;

            /* Delta in wall-clock seconds between the two recordings' starts */
            const utcDelta = (primary.startUtcMs && slot.startUtcMs)
                ? (slot.startUtcMs - primary.startUtcMs) / 1000
                : 0;

            /* slot should be at: primaryTime - utcDelta + slot's user offset
             * (subtracting utcDelta: if slot started later, its t=0 is further
             *  along the wall-clock, so we need a smaller playback position) */
            return primaryCurrentTime - utcDelta + slot.userOffsetSecs;
        };

        /* ── Shared AudioContext (created once, resumed on first play interaction) ── */
        let sharedAudioCtx = null;

        const getAudioCtx = () => {
            if (!sharedAudioCtx) {
                try { sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch (_e) { sharedAudioCtx = null; }
            }
            return sharedAudioCtx;
        };

        const resumeAudioCtx = () => {
            const ctx = getAudioCtx();
            if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
        };

        /* ── Slot creation ── */
        const createSlotObject = (recording) => {
            /* First slot defaults to 100% volume, every subsequent slot to 0% */
            const isFirst = slots.length === 0;
            return {
                id: `slot-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                recording,
                startUtcMs: Number(recording.recording_start_utc_ms) || null,
                userOffsetSecs: 0,
                videoEl: null,
                volume: isFirst ? 1 : 0,
                pan: 0,
                audioSourceNode: null,  /* MediaElementAudioSourceNode */
                pannerNode: null,       /* StereoPannerNode */
                gainNode: null,         /* GainNode for per-slot volume */
            };
        };

        /* ── DOM slot builder ── */
        const buildSlotEl = (slot, index) => {
            const rec  = slot.recording;
            const isLive = Boolean(rec.is_live);
            const label = escHtml(`${rec.channel} – ${rec.display_title || rec.file_name}`);

            const el = document.createElement('div');
            el.className = 'mp-slot';
            el.dataset.slotId = slot.id;
            el.innerHTML = `
                <div class="mp-slot-header">
                    ${isLive ? '<span class="mp-slot-live-dot" title="Live" aria-label="Live"></span>' : ''}
                    <span class="mp-slot-label" title="${label}">${label}</span>
                    <div class="mp-slot-badges">
                        <button type="button" class="mp-slot-remove-btn" data-slot-id="${slot.id}"
                            aria-label="Remove this video">✕</button>
                    </div>
                </div>

                <div class="mp-slot-video-wrap">
                    <video
                        class="mp-slot-video"
                        preload="${isLive ? 'auto' : 'metadata'}"
                        playsinline
                    ></video>
                    <div class="mp-slot-overlay" id="overlay-${slot.id}">
                        <span class="mp-slot-overlay-text">Loading…</span>
                    </div>
                </div>

                <div class="mp-slot-controls">
                <button type="button" class="mp-slot-ctrl-btn mp-slot-play-btn" data-slot-id="${slot.id}"
                    aria-label="Play/Pause this video">
                    <svg class="mp-icon-play" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="mp-icon-pause" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true" hidden>
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <div class="mp-slot-av-controls">
                    <div class="mp-av-row">
                        <span class="mp-av-label">Vol</span>
                        <input
                            type="range"
                            class="mp-volume-slider"
                            data-slot-id="${slot.id}"
                            min="0" max="1" step="0.02" value="${slot.volume}"
                            aria-label="Volume"
                        >
                        <span class="mp-av-value mp-volume-value" id="vol-val-${slot.id}">${fmtVolume(slot.volume)}</span>
                    </div>
                    <div class="mp-av-row">
                        <span class="mp-av-label">Pan</span>
                        <input
                            type="range"
                            class="mp-pan-slider"
                            data-slot-id="${slot.id}"
                            min="-1" max="1" step="0.05" value="0"
                            aria-label="Pan left/right"
                        >
                        <span class="mp-av-value mp-pan-value" id="pan-val-${slot.id}">C</span>
                    </div>
                </div>

                <div class="mp-offset-group" aria-label="Time offset adjustment">
                    <span class="mp-offset-label">Offset</span>
                    <button type="button" class="mp-offset-dec" data-slot-id="${slot.id}"
                        aria-label="Decrease offset by 0.1 seconds">−</button>
                    <input
                        type="number"
                        class="mp-offset-input"
                        data-slot-id="${slot.id}"
                        value="0"
                        step="0.1"
                        aria-label="Time offset in seconds (positive = delay this video)"
                    >
                    <button type="button" class="mp-offset-inc" data-slot-id="${slot.id}"
                        aria-label="Increase offset by 0.1 seconds">+</button>
                </div>

                <span class="mp-slot-time" id="time-${slot.id}">0:00</span>
                </div>
            `;
            return el;
        };

        /* ── Stage layout refresh ── */
        const refreshStageLayout = () => {
            const count = slots.length;
            slotGrid.dataset.count = String(count);

            if (count === 0) {
                slotGrid.hidden = true;
                stageEmpty.hidden = false;
                syncBar.hidden = true;
            } else {
                slotGrid.hidden = false;
                stageEmpty.hidden = true;
                syncBar.hidden = false;
            }
        };

        /* ── Overlap window: the union UTC span of all loaded slots ──
         * Returns { startMs, endMs } or null when no slots have UTC data. */
        const getActiveWindowMs = () => {
            let startMs = Infinity;
            let endMs   = -Infinity;
            let hasData = false;
            slots.forEach((s) => {
                const sMs = s.startUtcMs;
                if (!sMs) return;
                hasData = true;
                const eMs = sMs + (s.recording.media_duration_seconds || 0) * 1000;
                if (sMs < startMs) startMs = sMs;
                if (eMs > endMs)   endMs   = eMs;
            });
            return hasData ? { startMs, endMs } : null;
        };

        /* Returns true when rec has any temporal overlap with the active window */
        const recOverlapsWindow = (rec, win) => {
            const rStart = Number(rec.recording_start_utc_ms) || 0;
            if (!rStart) return true; /* no UTC data — always show */
            const rEnd = rStart + (rec.media_duration_seconds || 0) * 1000;
            return rStart < win.endMs && rEnd > win.startMs;
        };

        /* ── Add a recording to the stage ── */
        const addSlot = (recording) => {
            if (slots.length >= MAX_SLOTS) {
                setSyncStatus(`Max ${MAX_SLOTS} videos reached.`, 'error');
                return;
            }

            /* Prevent duplicate */
            if (slots.some((s) => s.recording.relative_path === recording.relative_path)) {
                setSyncStatus('Already in player.', '');
                return;
            }

            const slot = createSlotObject(recording);

            slots.push(slot);

            const slotEl = buildSlotEl(slot, slots.length - 1);
            slotGrid.appendChild(slotEl);

            /* Wire video element — volume is controlled entirely through
               the gain node; videoEl.volume is always 1 so it never acts
               as a silent multiplier on top of the gain node */
            const videoEl = slotEl.querySelector('.mp-slot-video');
            slot.videoEl = videoEl;
            videoEl.volume = 1;
            videoEl.src = recording.media_url;

            /* Set initial pan track fill (pan=0 → --pan-pct:50% → no fill) */
            applyPan(slot.id, slot.pan);

            /* Hide loading overlay and auto-sync-play once metadata is ready */
            const overlay = document.getElementById(`overlay-${slot.id}`);
            videoEl.addEventListener('loadedmetadata', () => {
                if (overlay) overlay.classList.add('is-hidden');
                updateSyncBarDuration();

                /* If any other slot is already playing, seek this one to its
                   synced position and join playback immediately */
                const slotIdx = slots.indexOf(slot);
                const primary = slots[primarySlotIndex];
                if (primary && primary !== slot && primary.videoEl && !primary.videoEl.paused) {
                    const target = targetTimeForSlot(primary.videoEl.currentTime, slotIdx);
                    if (target >= 0) videoEl.currentTime = target;
                    videoEl.play().catch(() => {});
                }
            }, { once: true });

            videoEl.addEventListener('timeupdate', () => {
                const timeEl = document.getElementById(`time-${slot.id}`);
                if (timeEl) timeEl.textContent = fmtTime(videoEl.currentTime);
                if (slots[primarySlotIndex]?.id === slot.id) {
                    updateSyncBarPosition();
                }
            });

            videoEl.addEventListener('play', () => {
                refreshPlayPauseIcon(slot);
                /* Wire audio graph on first play (requires user gesture) */
                resumeAudioCtx();
                wireAudioGraph(slot);
                /* Re-apply stored volume/pan now that graph is wired */
                applyVolume(slot.id, slot.volume);
                applyPan(slot.id, slot.pan);
            });
            videoEl.addEventListener('pause', () => refreshPlayPauseIcon(slot));
            videoEl.addEventListener('ended', () => refreshPlayPauseIcon(slot));

            refreshStageLayout();
            renderPickerList(); /* re-render to update "add" button states + overlap filter */
            updateSyncBarDuration();
            setSyncStatus(`Added "${recording.display_title || recording.channel}".`, 'synced');
        };

        const refreshPlayPauseIcon = (slot) => {
            if (!slot.videoEl) return;
            const slotEl = slotGrid.querySelector(`[data-slot-id="${slot.id}"]`);
            if (!slotEl) return;
            const playBtn = slotEl.querySelector(`.mp-slot-play-btn`);
            if (!playBtn) return;
            const paused = slot.videoEl.paused || slot.videoEl.ended;
            const playIcon  = playBtn.querySelector('.mp-icon-play');
            const pauseIcon = playBtn.querySelector('.mp-icon-pause');
            if (playIcon)  playIcon.hidden  = !paused;
            if (pauseIcon) pauseIcon.hidden = paused;
        };

        /* ── Remove a slot ── */
        const removeSlot = (slotId) => {
            const idx = slots.findIndex((s) => s.id === slotId);
            if (idx < 0) return;

            const slot = slots[idx];
            if (slot.audioSourceNode) {
                try { slot.audioSourceNode.disconnect(); } catch (_e) {}
            }
            if (slot.videoEl) {
                slot.videoEl.pause();
                slot.videoEl.src = '';
            }

            const slotEl = slotGrid.querySelector(`.mp-slot[data-slot-id="${slotId}"]`);
            if (slotEl) slotEl.remove();

            slots.splice(idx, 1);

            if (primarySlotIndex >= slots.length) primarySlotIndex = Math.max(0, slots.length - 1);

            refreshStageLayout();
            renderPickerList();
            updateSyncBarDuration();

            if (slots.length === 0) setSyncStatus('', '');
            /* renderPickerList() above already re-applies the overlap filter;
               when slots is now empty, getActiveWindowMs() returns null and
               all recordings become available again automatically */
        };

        /* ── Sync engine ── */
        const doSync = () => {
            if (slots.length < 2 || isSeeking) return;
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl || primary.videoEl.readyState < 1) return;
            const primaryTime = primary.videoEl.currentTime;

            slots.forEach((slot, i) => {
                if (i === primarySlotIndex) return;
                if (!slot.videoEl || slot.videoEl.readyState < 1) return;
                const target = targetTimeForSlot(primaryTime, i);
                if (target < 0) {
                    /* The peer recording hasn't started yet relative to primary */
                    if (!slot.videoEl.paused) slot.videoEl.pause();
                    return;
                }
                const drift = Math.abs(slot.videoEl.currentTime - target);
                if (drift > DRIFT_TOLERANCE_S) {
                    slot.videoEl.currentTime = target;
                }
            });
        };

        const startSyncTimer = () => {
            if (syncTimer !== null) return;
            syncTimer = window.setInterval(doSync, SYNC_INTERVAL_MS);
        };

        const stopSyncTimer = () => {
            if (syncTimer === null) return;
            window.clearInterval(syncTimer);
            syncTimer = null;
        };

        /* ── Sync bar ── */
        const updateSyncBarDuration = () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) { syncSeek.max = '0'; syncDurationEl.textContent = '0:00'; return; }
            const dur = primary.videoEl.duration;
            if (Number.isFinite(dur) && dur > 0) {
                syncSeek.max = String(dur);
                syncDurationEl.textContent = fmtTime(dur);
            }
        };

        const updateSyncBarPosition = () => {
            if (isSeeking) return;
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            const t = primary.videoEl.currentTime;
            syncSeek.value = String(t);
            syncTimeEl.textContent = fmtTime(t);
        };

        /* ── Play / Pause all ── */
        const playAll = () => {
            slots.forEach((s) => { if (s.videoEl && s.videoEl.paused) s.videoEl.play().catch(() => {}); });
            startSyncTimer();
            setSyncStatus('Playing.', 'synced');
        };

        const pauseAll = () => {
            slots.forEach((s) => { if (s.videoEl && !s.videoEl.paused) s.videoEl.pause(); });
            setSyncStatus('Paused.', '');
        };

        /* ── Full re-sync from primary ── */
        const reSyncAll = () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            const primaryTime = primary.videoEl.currentTime;
            slots.forEach((s, i) => {
                if (i === primarySlotIndex || !s.videoEl) return;
                const target = targetTimeForSlot(primaryTime, i);
                if (target >= 0) s.videoEl.currentTime = target;
            });
            setSyncStatus('Re-synced.', 'synced');
        };

        /* ── Global seek ── */
        const seekAllTo = (primaryTargetTime) => {
            const clamped = Math.max(0, primaryTargetTime);
            slots.forEach((s, i) => {
                if (!s.videoEl) return;
                if (i === primarySlotIndex) {
                    s.videoEl.currentTime = clamped;
                } else {
                    const target = targetTimeForSlot(clamped, i);
                    if (target >= 0) s.videoEl.currentTime = target;
                }
            });
        };

        /* ── Volume / Pan helpers ── */
        const fmtVolume = (v) => `${Math.round(v * 100)}%`;

        const fmtPan = (p) => {
            const v = Math.round(p * 100);
            if (v === 0) return 'C';
            return v < 0 ? `L${Math.abs(v)}` : `R${v}`;
        };

        const applyVolume = (slotId, rawValue) => {
            const slot = slots.find((s) => s.id === slotId);
            if (!slot) return;
            const vol = Math.max(0, Math.min(1, Number(rawValue) || 0));
            slot.volume = vol;
            /* Once the audio graph is wired, the gain node is the sole volume
               control; videoEl.volume stays at 1 so it never silently multiplies.
               Before the graph is wired (no AudioContext yet), fall back to
               videoEl.volume directly so the slider still has an effect. */
            if (slot.gainNode) {
                slot.gainNode.gain.value = vol;
            } else if (slot.videoEl) {
                slot.videoEl.volume = vol;
            }
            const label = document.getElementById(`vol-val-${slotId}`);
            if (label) label.textContent = fmtVolume(vol);
        };

        const applyPan = (slotId, rawValue) => {
            const slot = slots.find((s) => s.id === slotId);
            if (!slot) return;
            const pan = Math.max(-1, Math.min(1, Number(rawValue) || 0));
            slot.pan = pan;
            if (slot.pannerNode) {
                slot.pannerNode.pan.value = pan;
            }
            /* Update track fill: map -1..+1 to 0%..100% for --pan-pct */
            const slider = slotGrid.querySelector(`.mp-pan-slider[data-slot-id="${slotId}"]`);
            if (slider) slider.style.setProperty('--pan-pct', `${(pan + 1) * 50}%`);
            const label = document.getElementById(`pan-val-${slotId}`);
            if (label) label.textContent = fmtPan(pan);
        };

        /* Wire the Web Audio graph for a slot: video → gain → panner → destination.
         * This is called after the video element exists and the user has interacted
         * (so AudioContext can be created/resumed). Each video element can only be
         * connected once, so we guard with audioSourceNode. */
        const wireAudioGraph = (slot) => {
            if (slot.audioSourceNode || !slot.videoEl) return;
            const ctx = getAudioCtx();
            if (!ctx) return;
            try {
                const source = ctx.createMediaElementSource(slot.videoEl);
                const gain   = ctx.createGain();
                const panner = ctx.createStereoPanner();
                gain.gain.value   = slot.volume;
                panner.pan.value  = slot.pan;
                source.connect(gain);
                gain.connect(panner);
                panner.connect(ctx.destination);
                slot.audioSourceNode = source;
                slot.gainNode        = gain;
                slot.pannerNode      = panner;
                /* Ensure the element-level volume is full so it never mutes
                   the gain node's output as a silent multiplier */
                slot.videoEl.volume = 1;
            } catch (_e) {
                /* Older browsers without StereoPannerNode — graceful fallback */
            }
        };

        /* ── User offset change ── */
        const applyUserOffset = (slotId, newOffsetSecs) => {
            const slot = slots.find((s) => s.id === slotId);
            if (!slot) return;
            slot.userOffsetSecs = Number(newOffsetSecs) || 0;
            /* Immediately re-sync */
            reSyncAll();
            const input = slotGrid.querySelector(`.mp-offset-input[data-slot-id="${slotId}"]`);
            if (input) {
                input.classList.toggle('is-nonzero', slot.userOffsetSecs !== 0);
            }
        };

        /* ── Picker rendering ── */
        const buildChannelDays = (recordings) => {
            const map = {};
            recordings.forEach((r) => {
                const ch = r.channel || 'unknown';
                if (!map[ch]) map[ch] = new Set();
                map[ch].add(r.day || 'unknown');
            });
            const out = {};
            for (const [ch, days] of Object.entries(map)) {
                out[ch] = Array.from(days).sort((a, b) => b.localeCompare(a));
            }
            return out;
        };

        const populatePickerFilters = (channels) => {
            const prevCh  = filterChannel.value || 'all';
            const prevDay = filterDay.value || 'all';
            filterChannel.innerHTML = '<option value="all">All channels</option>';
            const sorted = [...channels].sort((a, b) => a.localeCompare(b));
            sorted.forEach((ch) => {
                const opt = document.createElement('option');
                opt.value = ch; opt.textContent = ch;
                filterChannel.appendChild(opt);
            });
            filterChannel.value = sorted.includes(prevCh) ? prevCh : 'all';
            populateDayFilter(prevDay);
        };

        const populateDayFilter = (prevDay = 'all') => {
            const ch = filterChannel.value || 'all';
            const daySet = new Set();
            if (ch === 'all') {
                Object.values(channelDays).forEach((days) => days.forEach((d) => daySet.add(d)));
            } else {
                (channelDays[ch] || []).forEach((d) => daySet.add(d));
            }
            const dayVals = Array.from(daySet).sort((a, b) => b.localeCompare(a));
            filterDay.innerHTML = '<option value="all">All days</option>';
            dayVals.forEach((d) => {
                const opt = document.createElement('option');
                opt.value = d; opt.textContent = d;
                filterDay.appendChild(opt);
            });
            filterDay.value = dayVals.includes(prevDay) ? prevDay : 'all';
        };

        const renderPickerList = () => {
            const ch     = filterChannel.value || 'all';
            const day    = filterDay.value || 'all';
            const query  = (filterSearch.value || '').trim().toLowerCase();
            const inSlot = new Set(slots.map((s) => s.recording.relative_path));
            const win    = getActiveWindowMs(); /* null when no slots loaded */

            const filtered = allRecordings.filter((r) => {
                if (ch  !== 'all' && r.channel !== ch)  return false;
                if (day !== 'all' && r.day     !== day) return false;
                if (query) {
                    const haystack = `${r.channel} ${r.display_title || ''} ${r.file_name || ''}`.toLowerCase();
                    if (!haystack.includes(query)) return false;
                }
                /* Once a slot is loaded, hide recordings with no time overlap */
                if (win && !inSlot.has(r.relative_path) && !recOverlapsWindow(r, win)) return false;
                return true;
            });

            if (filtered.length === 0) {
                pickerList.innerHTML = '';
                pickerEmpty.hidden = false;
                pickerEmpty.textContent = allRecordings.length === 0 ? 'Loading recordings…' : 'No recordings match.';
                return;
            }

            pickerEmpty.hidden = true;

            const fragment = document.createDocumentFragment();
            filtered.forEach((rec) => {
                const alreadyAdded = inSlot.has(rec.relative_path);
                const slotsFull    = slots.length >= MAX_SLOTS;
                const thumb = escHtml(rec.thumbnail_url || FALLBACK_THUMB);
                const title = escHtml(rec.display_title || rec.file_name || 'recording');
                const sub   = escHtml(`${rec.channel} · ${rec.day}${rec.is_live ? ' · LIVE' : ''}`);
                const startedAt = rec.started_at
                    ? fmtDateTime(rec.started_at)
                    : (rec.recorded_at ? fmtDateTime(rec.recorded_at) : '');

                const item = document.createElement('div');
                item.className = 'mp-pick-item' + (alreadyAdded ? ' is-selected' : '') + (rec.is_live ? ' is-live' : '');
                item.role = 'listitem';
                item.dataset.path = rec.relative_path;
                item.innerHTML = `
                    <img class="mp-pick-thumb" src="${thumb}" alt="" loading="lazy" decoding="async">
                    <div class="mp-pick-meta">
                        <p class="mp-pick-title" title="${title}">${title}</p>
                        <p class="mp-pick-sub">${sub}${startedAt ? ' · ' + escHtml(startedAt) : ''}</p>
                    </div>
                    <div class="mp-pick-badges">
                        <button
                            type="button"
                            class="mp-pick-add-btn ${alreadyAdded ? 'secondary' : ''}"
                            data-path="${escHtml(rec.relative_path)}"
                            aria-label="${alreadyAdded ? 'Already added' : 'Add to player'}"
                            ${alreadyAdded || slotsFull ? 'disabled' : ''}
                        >${alreadyAdded ? 'Added' : 'Add'}</button>
                    </div>
                `;
                fragment.appendChild(item);
            });

            pickerList.innerHTML = '';
            pickerList.appendChild(fragment);
        };

        /* ── Catalog fetch ── */
        const fetchCatalog = async ({ force = false } = {}) => {
            try {
                const res = await fetch(RECORDINGS_INDEX, {
                    cache: 'no-store',
                    headers: { 'X-Requested-With': 'vstreamware-multi-player' },
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const payload = await res.json();
                const sig = typeof payload.signature === 'string' ? payload.signature : '';
                if (!force && sig && sig === catalogSignature) return;
                catalogSignature = sig;

                allRecordings = (payload.recordings || []).map((r) => ({
                    channel:               String(r.channel || ''),
                    day:                   String(r.day || 'unknown'),
                    file_name:             String(r.file_name || ''),
                    display_title:         String(r.display_title || r.file_name || ''),
                    relative_path:         String(r.relative_path || ''),
                    media_url:             String(r.media_url || ''),
                    thumbnail_url:         String(r.thumbnail_url || ''),
                    view_url:              String(r.view_url || ''),
                    recorded_at:           String(r.recorded_at || ''),
                    recorded_at_unix:      Number(r.recorded_at_unix) || 0,
                    started_at:            r.started_at ? String(r.started_at) : '',
                    recording_start_utc_ms: Number(r.recording_start_utc_ms) || 0,
                    size_bytes:            Number(r.size_bytes) || 0,
                    is_live:               Boolean(r.is_live),
                    can_play:              Boolean(r.can_play),
                    quality:               r.quality ? String(r.quality) : '',
                    media_duration_seconds: Number(r.media_duration_seconds) || 0,
                }));

                channelDays = buildChannelDays(allRecordings);
                populatePickerFilters((payload.channels || []).map(String));
                renderPickerList();
            } catch (err) {
                console.error('Multi-player catalog fetch failed:', err);
            }
        };

        /* ── Picker click delegation ── */
        pickerList.addEventListener('click', (e) => {
            const btn = e.target.closest('.mp-pick-add-btn');
            if (!btn || btn.disabled) return;
            const path = btn.dataset.path;
            const rec  = allRecordings.find((r) => r.relative_path === path);
            if (rec) addSlot(rec);
        });

        /* ── Stage click delegation ── */
        slotGrid.addEventListener('click', (e) => {
            /* Remove button */
            const removeBtn = e.target.closest('.mp-slot-remove-btn');
            if (removeBtn) { removeSlot(removeBtn.dataset.slotId); return; }

            /* Per-slot play/pause */
            const playBtn = e.target.closest('.mp-slot-play-btn');
            if (playBtn) {
                const sid  = playBtn.dataset.slotId;
                const slot = slots.find((s) => s.id === sid);
                if (!slot?.videoEl) return;
                if (slot.videoEl.paused) {
                    slot.videoEl.play().catch(() => {});
                    startSyncTimer();
                } else {
                    slot.videoEl.pause();
                }
                return;
            }

            /* Offset dec/inc */
            const decBtn = e.target.closest('.mp-offset-dec');
            if (decBtn) {
                const sid   = decBtn.dataset.slotId;
                const input = slotGrid.querySelector(`.mp-offset-input[data-slot-id="${sid}"]`);
                if (input) {
                    const next = Math.round(((parseFloat(input.value) || 0) - 0.1) * 10) / 10;
                    input.value = String(next);
                    applyUserOffset(sid, next);
                }
                return;
            }

            const incBtn = e.target.closest('.mp-offset-inc');
            if (incBtn) {
                const sid   = incBtn.dataset.slotId;
                const input = slotGrid.querySelector(`.mp-offset-input[data-slot-id="${sid}"]`);
                if (input) {
                    const next = Math.round(((parseFloat(input.value) || 0) + 0.1) * 10) / 10;
                    input.value = String(next);
                    applyUserOffset(sid, next);
                }
                return;
            }
        });

        /* Offset input: direct entry */
        slotGrid.addEventListener('change', (e) => {
            if (!e.target.classList.contains('mp-offset-input')) return;
            const sid = e.target.dataset.slotId;
            applyUserOffset(sid, parseFloat(e.target.value) || 0);
        });

        /* Volume slider */
        slotGrid.addEventListener('input', (e) => {
            if (!e.target.classList.contains('mp-volume-slider')) return;
            applyVolume(e.target.dataset.slotId, e.target.value);
        });

        /* Pan slider */
        slotGrid.addEventListener('input', (e) => {
            if (!e.target.classList.contains('mp-pan-slider')) return;
            applyPan(e.target.dataset.slotId, e.target.value);
        });

        /* ── Toolbar buttons ── */
        btnPlayAll.addEventListener('click', playAll);
        btnPauseAll.addEventListener('click', pauseAll);
        btnSyncNow.addEventListener('click', reSyncAll);
        btnClearAll.addEventListener('click', () => {
            [...slots].forEach((s) => removeSlot(s.id));
            setSyncStatus('', '');
        });
        btnSeekBack.addEventListener('click', () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            seekAllTo(primary.videoEl.currentTime - SEEK_STEP_S);
        });
        btnSeekFwd.addEventListener('click', () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            seekAllTo(primary.videoEl.currentTime + SEEK_STEP_S);
        });

        /* ── Global sync seek slider ── */
        syncSeek.addEventListener('mousedown', () => { isSeeking = true; });
        syncSeek.addEventListener('touchstart', () => { isSeeking = true; }, { passive: true });
        syncSeek.addEventListener('input', () => {
            syncTimeEl.textContent = fmtTime(parseFloat(syncSeek.value));
        });
        syncSeek.addEventListener('change', () => {
            seekAllTo(parseFloat(syncSeek.value));
            isSeeking = false;
        });
        syncSeek.addEventListener('mouseup', () => { isSeeking = false; });
        syncSeek.addEventListener('touchend', () => { isSeeking = false; });

        /* ── Picker filters ── */
        filterChannel.addEventListener('change', () => { populateDayFilter(); renderPickerList(); });
        filterDay.addEventListener('change', renderPickerList);
        filterSearch.addEventListener('input', renderPickerList);

        /* ── Visibility / cleanup ── */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) { stopSyncTimer(); return; }
            if (slots.some((s) => s.videoEl && !s.videoEl.paused)) startSyncTimer();
            fetchCatalog();
        });
        window.addEventListener('beforeunload', stopSyncTimer);

        /* ── Boot ── */
        fetchCatalog({ force: true });
        /* Poll catalog every 10 s */
        window.setInterval(() => fetchCatalog(), 10_000);
    })();
    </script>
