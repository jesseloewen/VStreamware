                const listEl = document.getElementById(`slot-chat-${slot.id}`);
                if (!listEl) return;
                const data = chatData[ch];
                const wasNearBottom = isChatNearBottom(listEl);
                listEl.innerHTML = '';
                if (data && Array.isArray(data.messages)) {
                    const fragment = document.createDocumentFragment();
                    data.messages.forEach((m) => fragment.appendChild(buildChatMessageEl(m, ch, false)));
                    listEl.appendChild(fragment);
                }
                if (wasNearBottom) scrollChatToBottom(listEl);
            });
        };

        /* ── Render dispatch ── */
        const renderChatMessages = () => {
            if (chatMode === 'columns') {
                renderColumnsChat();
            } else {
                renderMergedChat();
            }
            renderSlotSidebarMessages();
        };

        /* ── Chat fetch ── */
        let chatFetchInFlight = false;

        const fetchChatForAllSlots = async () => {
            if (chatFetchInFlight) return;
            if (slots.length === 0) return;
            const primaryUtcMs = getPrimaryUtcMs();
            if (!primaryUtcMs) return;

            chatFetchInFlight = true;
            try {
                const uniqueChannelSlots = [];
                const seen = new Set();
                slots.forEach((slot) => {
                    const ch = slot.recording.channel;
                    if (!seen.has(ch)) {
                        seen.add(ch);
                        uniqueChannelSlots.push(slot);
                    }
                });

                await Promise.all(uniqueChannelSlots.map(async (slot) => {
                    const ch = slot.recording.channel;
                    if (!slot.recording.chat_url) return;
                    /* Compute target_ms for this slot: account for its UTC offset */
                    let targetMs = primaryUtcMs;
                    if (slot.startUtcMs) {
                        const slotCurrentTime = slot.videoEl ? slot.videoEl.currentTime : 0;
                        targetMs = Math.round(slot.startUtcMs + slotCurrentTime * 1000);
                    }
                    try {
                        const url = `${slot.recording.chat_url}?target_ms=${targetMs}&window_ms=${CHAT_WINDOW_MS}&limit=200`;
                        const res = await fetch(url, {
                            cache: 'no-store',
                            headers: { 'X-Requested-With': 'vstreamware-multi-player-chat' },
                        });
                        if (!res.ok) return;
                        const payload = await res.json();
                        if (!payload.available) {
                            chatData[ch] = { messages: [], latestUtcMs: null, available: false };
                            return;
                        }
                        chatData[ch] = {
                            messages: Array.isArray(payload.messages) ? payload.messages : [],
                            latestUtcMs: payload.latest_utc_ms || null,
                            available: true,
                        };
                    } catch (_e) {
                        /* ignore per-channel fetch errors */
                    }
                }));

                updateChatStatus();
                renderChatMessages();
            } finally {
                chatFetchInFlight = false;
            }
        };

        const updateChatStatus = () => {
            if (!chatStatusEl) return;
            if (slots.length === 0) {
                chatStatusEl.textContent = 'Add videos to start chat replay.';
                chatStatusEl.hidden = false;
                return;
            }
            const anyAvailable = Object.values(chatData).some((d) => d && d.available);
            if (!anyAvailable) {
                chatStatusEl.textContent = 'No chat data available for loaded videos.';
                chatStatusEl.hidden = false;
            } else {
                chatStatusEl.hidden = true;
            }
        };

        /* ── Chat polling ── */
        const stopChatPoll = () => {
            if (chatPollTimer !== null) {
                window.clearInterval(chatPollTimer);
                chatPollTimer = null;
            }
        };

        const scheduleChatPoll = () => {
            stopChatPoll();
            chatPollTimer = window.setInterval(() => {
                if (document.hidden) return;
                if (!isChatOpen() && !chatSidebarMode) return;
                void fetchChatForAllSlots();
            }, CHAT_POLL_MS);
        };

        /* ── Jump-to-latest button ── */
        /* Scroll listener on merged list */
        chatMergedList && chatMergedList.addEventListener('scroll', () => updateJumpBtn());

        /* Delegated scroll listener on columns container (covers all column lists) */
        chatColumnsEl && chatColumnsEl.addEventListener('scroll', () => updateJumpBtn(), true);

        if (chatJumpBtn) {
            chatJumpBtn.addEventListener('click', () => {
                if (chatMode === 'merged') {
                    scrollChatToBottom(chatMergedList);
                } else {
                    chatColumnsEl && chatColumnsEl.querySelectorAll('.mp-chat-list').forEach(
                        (el) => scrollChatToBottom(el)
                    );
                }
                chatAutoFollow = true;
                chatJumpBtn.hidden = true;
            });
        }

        /* ── Public hook: called from addSlot / removeSlot ── */
        const onSlotsChanged = () => {
            renderChannelSelector();
            rebuildSlotSidebars();
            updateChatStatus();
            /* Start/stop polling based on whether chat is needed */
            if (isChatOpen() || chatSidebarMode) {
                if (!chatPollTimer) scheduleChatPoll();
                void fetchChatForAllSlots();
            }
        };

        /* Initialize mode buttons from persisted state */
        (() => {
            try {
                const raw = window.localStorage.getItem(CHAT_MODE_KEY);
                if (raw === 'columns' || raw === 'merged') chatMode = raw;
            } catch (_e) {}
            setChatMode(chatMode, false);

            try {
                const raw = window.localStorage.getItem(CHAT_SIDEBAR_KEY);
                if (raw === '1' || raw === 'true') setSidebarMode(true, false);
            } catch (_e) {}

            const persistedChannels = readPersistedEnabledChannels();
            if (persistedChannels) chatEnabledChannels = persistedChannels;
        })();

        /* ── Catalog fetch ── */
        const fetchCatalog = async ({ force = false } = {}) => {
            try {
                const res = await fetch(RECORDINGS_INDEX, {
                    cache: 'no-store',
                    headers: { 'X-Requested-With': 'vstreamware-multi-player' },
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const payload = await res.json();
                const sig = typeof payload.signature === 'string' ? payload.signature : '';
                if (!force && sig && sig === catalogSignature) return;
                catalogSignature = sig;

                allRecordings = (payload.recordings || []).map((r) => ({
                    channel:               String(r.channel || ''),
                    day:                   String(r.day || 'unknown'),
                    file_name:             String(r.file_name || ''),
                    display_title:         String(r.display_title || r.file_name || ''),
                    relative_path:         String(r.relative_path || ''),
                    media_url:             String(r.media_url || ''),
                    chat_url:              String(r.chat_url || ''),
                    thumbnail_url:         String(r.thumbnail_url || ''),
                    view_url:              String(r.view_url || ''),
                    recorded_at:           String(r.recorded_at || ''),
                    recorded_at_unix:      Number(r.recorded_at_unix) || 0,
                    started_at:            r.started_at ? String(r.started_at) : '',
                    recording_start_utc_ms: Number(r.recording_start_utc_ms) || 0,
                    size_bytes:            Number(r.size_bytes) || 0,
                    is_live:               Boolean(r.is_live),
                    can_play:              Boolean(r.can_play),
                    quality:               r.quality ? String(r.quality) : '',
                    media_duration_seconds: Number(r.media_duration_seconds) || 0,
                }));

                channelDays = buildChannelDays(allRecordings);
                populatePickerFilters((payload.channels || []).map(String));
                renderPickerList();
            } catch (err) {
                console.error('Multi-player catalog fetch failed:', err);
            }
        };

        /* ── Picker click delegation ── */
        pickerList.addEventListener('click', (e) => {
            const btn = e.target.closest('.mp-pick-add-btn');
            if (!btn || btn.disabled) return;
            const path = btn.dataset.path;
            const rec  = allRecordings.find((r) => r.relative_path === path);
            if (rec) addSlot(rec);
        });

        /* ── Stage click delegation ── */
        slotGrid.addEventListener('click', (e) => {
            /* Remove button */
            const removeBtn = e.target.closest('.mp-slot-remove-btn');
            if (removeBtn) { removeSlot(removeBtn.dataset.slotId); return; }

            /* Per-slot play/pause */
            const playBtn = e.target.closest('.mp-slot-play-btn');
            if (playBtn) {
                const sid  = playBtn.dataset.slotId;
                const slot = slots.find((s) => s.id === sid);
                if (!slot?.videoEl) return;
                if (slot.videoEl.paused) {
                    slot.videoEl.play().catch(() => {});
                    startSyncTimer();
                } else {
                    slot.videoEl.pause();
                }
                return;
            }

            /* Offset dec/inc */
            const decBtn = e.target.closest('.mp-offset-dec');
            if (decBtn) {
                const sid   = decBtn.dataset.slotId;
                const input = slotGrid.querySelector(`.mp-offset-input[data-slot-id="${sid}"]`);
                if (input) {
                    const next = Math.round(((parseFloat(input.value) || 0) - 0.1) * 10) / 10;
                    input.value = String(next);
                    applyUserOffset(sid, next);
                }
                return;
            }

            const incBtn = e.target.closest('.mp-offset-inc');
            if (incBtn) {
                const sid   = incBtn.dataset.slotId;
                const input = slotGrid.querySelector(`.mp-offset-input[data-slot-id="${sid}"]`);
                if (input) {
                    const next = Math.round(((parseFloat(input.value) || 0) + 0.1) * 10) / 10;
                    input.value = String(next);
                    applyUserOffset(sid, next);
                }
                return;
            }
        });

        /* Offset input: direct entry */
        slotGrid.addEventListener('change', (e) => {
            if (!e.target.classList.contains('mp-offset-input')) return;
            const sid = e.target.dataset.slotId;
            applyUserOffset(sid, parseFloat(e.target.value) || 0);
        });

        /* Volume slider */
        slotGrid.addEventListener('input', (e) => {
            if (!e.target.classList.contains('mp-volume-slider')) return;
            applyVolume(e.target.dataset.slotId, e.target.value);
        });

        /* Pan slider */
        slotGrid.addEventListener('input', (e) => {
            if (!e.target.classList.contains('mp-pan-slider')) return;
            applyPan(e.target.dataset.slotId, e.target.value);
        });

        /* ── Toolbar / sync-bar buttons ── */
        if (btnPlayPauseAll) {
            btnPlayPauseAll.addEventListener('click', () => {
                if (isAnyPlaying()) pauseAll(); else playAll();
            });
        }
        btnSyncNow.addEventListener('click', reSyncAll);
        btnClearAll.addEventListener('click', () => {
            [...slots].forEach((s) => removeSlot(s.id));
            setSyncStatus('', '');
        });
        btnSeekBack.addEventListener('click', () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            seekAllTo(primary.videoEl.currentTime - SEEK_STEP_S);
        });
        btnSeekFwd.addEventListener('click', () => {
            const primary = slots[primarySlotIndex];
            if (!primary?.videoEl) return;
            seekAllTo(primary.videoEl.currentTime + SEEK_STEP_S);
        });

        /* ── Global sync seek slider ── */
        syncSeek.addEventListener('mousedown', () => { isSeeking = true; });
        syncSeek.addEventListener('touchstart', () => { isSeeking = true; }, { passive: true });
        syncSeek.addEventListener('input', () => {
            syncTimeEl.textContent = fmtTime(parseFloat(syncSeek.value));
        });
        syncSeek.addEventListener('change', () => {
            seekAllTo(parseFloat(syncSeek.value));
            isSeeking = false;
        });
        syncSeek.addEventListener('mouseup', () => { isSeeking = false; });
        syncSeek.addEventListener('touchend', () => { isSeeking = false; });

        /* ── Picker filters ── */
        filterChannel.addEventListener('change', () => { populateDayFilter(); renderPickerList(); });
        filterDay.addEventListener('change', renderPickerList);
        filterSearch.addEventListener('input', renderPickerList);

        /* ── Viewport resize: normalise panel states when crossing breakpoint ── */
        let mpLastWasMobile = isMobileViewport();
        window.addEventListener('resize', () => {
            const nowMobile = isMobileViewport();
            if (nowMobile === mpLastWasMobile) return;
            mpLastWasMobile = nowMobile;
            if (!nowMobile) {
                /* Switched to desktop: close any mobile overlay, restore desktop state */
                if (pickerPanel) pickerPanel.classList.remove('is-open');
                hideMpOverlay();
                updatePickerToggleState();
                /* Restore desktop picker collapse state */
                try {
                    const raw = window.localStorage.getItem(PICKER_COLLAPSE_KEY);
                    const wasCollapsed = raw === '1' || raw === 'true';
                    mpPage.classList.toggle(PICKER_COLLAPSE_CLASS, wasCollapsed);
                    updatePickerToggleState();
                } catch (_e) {}
                /* Chat panel: apply persisted open state on desktop */
                try {
                    const raw = window.localStorage.getItem(CHAT_PANEL_KEY);
                    if (raw !== '1' && raw !== 'true') setChatOpen(false, false);
                } catch (_e) {}
            } else {
                /* Switched to mobile: ensure desktop layout classes are removed */
                updatePickerToggleState();
                updateChatToggleState();
            }
        }, { passive: true });

        /* ── Visibility / cleanup ── */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) { stopSyncTimer(); stopChatPoll(); return; }
            if (slots.some((s) => s.videoEl && !s.videoEl.paused)) startSyncTimer();
            if ((isChatOpen() || chatSidebarMode) && slots.length > 0) {
                scheduleChatPoll();
                void fetchChatForAllSlots();
            }
            fetchCatalog();
        });
        window.addEventListener('beforeunload', () => { stopSyncTimer(); stopChatPoll(); });

        /* ── Boot ── */
        /* Restore chat panel open state (deferred here so scheduleChatPoll is defined) */
        (() => {
            try {
                const raw = window.localStorage.getItem(CHAT_PANEL_KEY);
                if (raw === '1' || raw === 'true') setChatOpen(true, false);
                else updateChatToggleState();
            } catch (_e) { updateChatToggleState(); }
        })();

        fetchCatalog({ force: true });
        /* Poll catalog every 10 s */
        window.setInterval(() => fetchCatalog(), 10_000);
        /* Kick off chat polling if sidebar mode was restored (panel open handled by setChatOpen above) */
        if (!isChatOpen() && chatSidebarMode) scheduleChatPoll();
    })();
    </script>
</body>
</html>
